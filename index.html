<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>🐊 IPTV PREMIUM LUIS R 🦈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .main-header {
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 100%);
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(59,130,246,0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 8px #3b82f6);
        }
        .logo-text {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, #fff, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .platform-badges {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            padding: 6px 18px;
            border-radius: 40px;
        }
        .platform-badges span {
            font-size: 14px;
            font-weight: 600;
            color: #ccc;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(20,20,30,0.8);
            padding: 6px 20px;
            border-radius: 40px;
            border: 1px solid rgba(59,130,246,0.3);
        }
        .user-greeting { font-size: 13px; color: #aaa; }
        .user-name { font-weight: bold; color: #3b82f6; }
        .expiry-badge { font-size: 12px; background: #1e293b; padding: 4px 12px; border-radius: 20px; color: #facc15; }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .icon-btn {
            background: rgba(30,30,40,0.9);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .icon-btn:hover { background: #3b82f6; transform: scale(1.02); }
        #clock { font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 30px; }

        /* Top categories */
        .top-categories {
            display: flex;
            gap: 20px;
            padding: 16px 40px;
            background: linear-gradient(180deg, #0f0f0f 0%, #0a0a0a 100%);
            border-bottom: 1px solid #1f1f1f;
            overflow-x: auto;
        }
        .top-cat {
            font-size: 15px;
            font-weight: 600;
            padding: 8px 0;
            cursor: pointer;
            color: #aaa;
            border-bottom: 3px solid transparent;
        }
        .top-cat.active { color: white; border-bottom-color: #3b82f6; }

        /* Main layout */
        .app-main {
            display: flex;
            height: calc(100vh - 130px);
            overflow: hidden;
            padding: 0 20px 20px 20px;
            gap: 20px;
        }
        .content-sidebar {
            width: 320px;
            background: rgba(15,15,20,0.9);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .search-wrapper { padding: 18px 16px 12px; }
        #searchInput {
            width: 100%;
            padding: 12px 18px;
            background: #1e1e2a;
            border: 1px solid #2d2d3a;
            border-radius: 40px;
            color: white;
        }
        .categories-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 20px;
        }
        .category-modern {
            margin-bottom: 12px;
            background: #111115;
            border-radius: 20px;
            overflow: hidden;
        }
        .category-modern-header {
            padding: 14px 18px;
            background: #18181e;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }
        .category-modern-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease-out;
            background: #0f0f12;
        }
        .category-modern-content.open { max-height: 480px; overflow-y: auto; }
        .channel-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #ddd;
        }
        .channel-item:hover { background: #2a2a36; color: white; }

        /* ========== PLAYER PERSONALIZADO MEJORADO ========== */
        .player-area {
            flex: 1;
            background: #030303;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(59,130,246,0.2);
            position: relative;
        }
        .video-container {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Controles personalizados */
        .custom-controls {
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 100%);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid #333;
        }
        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .progress-time { font-size: 13px; font-family: monospace; color: #ccc; min-width: 70px; }
        .progress-bar {
            flex: 1;
            height: 8px;
            background: #444;
            border-radius: 10px;
            cursor: pointer;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #3b82f6;
            border-radius: 10px;
        }
        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: #1e1e2a;
            border: none;
            color: white;
            font-size: 20px;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }
        .ctrl-btn:hover { background: #3b82f6; transform: scale(1.02); }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e1e2a;
            padding: 5px 12px;
            border-radius: 40px;
        }
        .volume-slider { width: 100px; }

        /* Panel de idiomas y subtítulos */
        .lang-panel {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            justify-content: flex-end;
        }
        .lang-btn {
            background: #2d2d3a;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .lang-btn.active { background: #3b82f6; }

        /* Overlay para navegación en modo fullscreen */
        .fullscreen-sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(16px);
            z-index: 2000;
            transition: left 0.3s ease;
            overflow-y: auto;
            padding: 20px;
            border-right: 1px solid #3b82f6;
        }
        .fullscreen-sidebar.open { left: 0; }
        .close-sidebar {
            background: #e50914;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .fullscreen-channel-item {
            padding: 12px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            color: #ddd;
        }
        .fullscreen-channel-item:hover { background: #3b82f6; color: white; }

        .now-playing {
            background: linear-gradient(90deg, #0a0a0a, #111);
            padding: 10px 24px;
            font-size: 14px;
            color: #aaa;
            display: flex;
            gap: 12px;
        }
        .now-playing span:first-child { color: #3b82f6; font-weight: bold; }

        @media (max-width: 800px) {
            .main-header { padding: 10px 16px; }
            .user-info { display: none; }
            .app-main { flex-direction: column; padding: 12px; }
            .content-sidebar { width: 100%; max-height: 45%; }
            .platform-badges { display: none; }
        }
    </style>
</head>
<body>

<div class="main-header">
    <div class="logo-area">
        <span class="logo-icon">🐊🦈</span>
        <span class="logo-text">LUIS R PREMIUM IPTV</span>
    </div>
    <div class="platform-badges"><span>NETFLIX</span><span>YouTube</span><span>HBO</span><span>SPORTS</span></div>
    <div class="user-info" id="userInfoArea">
        <div class="user-greeting">Logged in as: <span class="user-name" id="activeUserName">--</span></div>
        <div class="expiry-badge" id="expiryBadge">Expiration: --</div>
    </div>
    <div class="header-actions">
        <button class="icon-btn" id="parentalBtn">🔒 Control Parental</button>
        <button class="icon-btn" id="serverBtn"><span id="serverName">--</span> ▼</button>
        <button class="icon-btn" id="addBtn">➕ LISTA</button>
        <div id="clock"></div>
    </div>
</div>

<div class="top-categories" id="quickCats">
    <div class="top-cat active" data-tab="live">📺 LIVE TV</div>
    <div class="top-cat" data-tab="movies">🎬 PELIS</div>
    <div class="top-cat" data-tab="series">📺 SERIES</div>
    <div class="top-cat" data-tab="sports">⚽ SPORTS</div>
    <div class="top-cat" data-tab="kids">🧸 KIDS</div>
</div>

<div class="app-main">
    <div class="content-sidebar">
        <div class="search-wrapper"><input type="text" id="searchInput" placeholder="🔍 Buscar..."></div>
        <div class="categories-scroll" id="categoriesContainer"><div class="loading-spinner">Cargando...</div></div>
    </div>
    <div class="player-area">
        <div class="video-container"><video id="video" playsinline></video></div>
        <div class="custom-controls">
            <div class="progress-bar-container">
                <span class="progress-time" id="currentTimeDisplay">00:00</span>
                <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                <span class="progress-time" id="durationDisplay">00:00</span>
            </div>
            <div class="control-buttons">
                <button class="ctrl-btn" id="rewindBtn">⏪ 10s</button>
                <button class="ctrl-btn" id="playPauseBtn">▶️ Play</button>
                <button class="ctrl-btn" id="forwardBtn">10s ⏩</button>
                <button class="ctrl-btn" id="fullscreenBtn">🖥️ Full</button>
                <div class="volume-control"><span>🔊</span><input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8"></div>
            </div>
            <div class="lang-panel" id="langPanel">
                <button class="lang-btn" id="audioBtn">🎤 Audio: --</button>
                <button class="lang-btn" id="subsBtn">📄 Subtítulos: Off</button>
                <button class="lang-btn" id="channelsBtnFS">📋 Canales (Full)</button>
            </div>
        </div>
        <div class="now-playing"><span>▶ AHORA:</span><span id="currentTitle">Selecciona contenido</span></div>
    </div>
</div>

<!-- Sidebar flotante para modo fullscreen -->
<div id="fullscreenSidebar" class="fullscreen-sidebar">
    <button class="close-sidebar" id="closeSidebarBtn">✖ Cerrar</button>
    <div id="fsCategoriesContainer">Cargando...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    // ==================== CONFIGURACIÓN GLOBAL ====================
    let servers = [];
    let currentServer = null;
    let currentTab = 'live';
    let categoriesData = {};
    let streamsCache = {};
    let searchTerm = '';
    let hlsPlayer = null;
    let parentalLock = false;
    let parentalPassword = "1234";
    let serverExpiryDates = {};

    // Listas extras (7 listas IPTV)
    const listasExtras = [
        { id: 101, nombre: "RAFAEL MAZZILLI", m3uUrl: "http://latinchannel.tv:8080/get.php?username=rafael.mazzilli&password=mazzilli1402&type=m3u_plus", type: "m3u", active: false },
        { id: 102, nombre: "JENNI PAOLA", m3uUrl: "http://latinchannel.tv:8080/get.php?username=jenni.paola&password=paola1707&type=m3u_plus", type: "m3u", active: false },
        { id: 103, nombre: "CINEMA JULIO", m3uUrl: "http://latinchannel.tv:8080/get.php?username=cinema.julio&password=julio1987&type=m3u_plus", type: "m3u", active: false },
        { id: 104, nombre: "JUAN ROMANO", m3uUrl: "http://latinchannel.tv:8080/get.php?username=juan.romano&password=romano2204&type=m3u_plus", type: "m3u", active: false },
        { id: 105, nombre: "MIGUEL JESUS", m3uUrl: "http://latinchannel.tv:8080/get.php?username=miguel.jesus&password=jesus1707&type=m3u_plus", type: "m3u", active: false },
        { id: 106, nombre: "ANA VALENTINA", m3uUrl: "http://latinchannel.tv:8080/get.php?username=ana.valentina&password=valentina1905&type=m3u_plus", type: "m3u", active: false },
        { id: 107, nombre: "ALISON", m3uUrl: "http://latinchannel.tv:8080/get.php?username=alison&password=151108&type=m3u_plus", type: "m3u", active: false }
    ];
    const defaultServersBase = [
        { id: 1, name: "MSTR TV", url: "http://mstrtv.com:25461", user: "Joseangeljaur", pass: "c91dea7b374135eb7eac31a468326e75", type: "xtream", active: true },
        { id: 2, name: "BSTV", url: "http://bstv.online:8080", user: "7876151421", pass: "7876151421", type: "xtream", active: false },
        { id: 3, name: "PLAY TV", url: "http://playtv44.com:8080", user: "MASTER", pass: "23423", type: "xtream", active: false },
        { id: 4, name: "TV LITE", url: "http://tvlite.xyz:8080", user: "claudiocalderon62725", pass: "M3zVt2nfwb", type: "xtream", active: false },
        { id: 5, name: "TECNOMOLLY", url: "http://app.tecnomolly.com:8080", user: "cesarjacobo2", pass: "gWVQ4n2UXZC4", type: "xtream", active: false }
    ];
    function buildFullServers() { return [...defaultServersBase, ...listasExtras]; }
    function saveFullData() { localStorage.setItem('iptv_luis_premium_v4', JSON.stringify({ servers, expiryDates: serverExpiryDates, parentalPassword, parentalLock })); }
    function loadServers() {
        const saved = localStorage.getItem('iptv_luis_premium_v4');
        if(saved) { try { const data = JSON.parse(saved); servers = data.servers; serverExpiryDates = data.expiryDates; parentalPassword = data.parentalPassword; parentalLock = data.parentalLock; } catch(e) {} }
        if(!servers || !servers.length) { servers = buildFullServers(); const now = new Date(); servers.forEach(s => { const expiry = new Date(now); expiry.setFullYear(expiry.getFullYear()+1); serverExpiryDates[s.id] = expiry.toISOString(); }); saveFullData(); }
        currentServer = servers.find(s => s.active) || servers[0];
        if(currentServer && !currentServer.active) { currentServer.active = true; saveFullData(); }
        updateHeaderInfo();
        loadCategories();
    }
    function updateHeaderInfo() { document.getElementById('serverName').innerText = currentServer.name; document.getElementById('activeUserName').innerText = currentServer.user || (currentServer.type==='m3u'?'M3U':currentServer.name); document.getElementById('expiryBadge').innerHTML = `Expira: ${serverExpiryDates[currentServer.id] ? new Date(serverExpiryDates[currentServer.id]).toLocaleDateString() : '∞'}`; }
    function setActiveServer(id) { servers = servers.map(s => ({...s, active: s.id===id})); currentServer = servers.find(s=>s.id===id); saveFullData(); updateHeaderInfo(); loadCategories(); }
    function apiUrl(action, params='') { if(currentServer.type!=='xtream') return ''; return `${currentServer.url}/player_api.php?username=${currentServer.user}&password=${currentServer.pass}&action=${action}${params}`; }
    async function fetchAPI(url) { try { const res = await fetch(url); if(!res.ok) return null; const text = await res.text(); try { return JSON.parse(text); } catch(e) { return null; } } catch(e) { return null; } }
    async function parseM3U(m3uUrl) {
        try { const res = await fetch(m3uUrl); if(!res.ok) return null; const content = await res.text(); const lines = content.split('\n'); const channelsByCat = {}; for(let i=0;i<lines.length;i++){ let line=lines[i].trim(); if(line.startsWith('#EXTINF:')){ const nameMatch=line.match(/#EXTINF:.*?,(.*)$/); const name=nameMatch?nameMatch[1]:"Sin nombre"; const groupMatch=line.match(/group-title="([^"]*)"/); let category=groupMatch?groupMatch[1]:"General"; let urlLine=""; for(let j=i+1;j<lines.length;j++){ if(lines[j].trim() && !lines[j].trim().startsWith('#')){ urlLine=lines[j].trim(); break; } } if(urlLine && name!=="Sin nombre"){ if(!channelsByCat[category]) channelsByCat[category]=[]; channelsByCat[category].push({name, url:urlLine}); } } } return channelsByCat; } catch(e){ return null; }
    }
    async function loadCategories() {
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = '<div class="loading-spinner">Cargando...</div>';
        if(currentServer.type === 'm3u') {
            const parsed = await parseM3U(currentServer.m3uUrl);
            if(!parsed) { container.innerHTML = '<div class="error-box">Error M3U</div>'; return; }
            const catList = Object.keys(parsed).map((name,idx)=>({category_id:idx, category_name:name}));
            categoriesData[currentTab]=catList;
            streamsCache[currentTab]=parsed;
            renderCategories(catList);
            return;
        }
        let endpoint = '';
        if(currentTab==='live') endpoint=apiUrl('get_live_categories');
        else if(currentTab==='movies') endpoint=apiUrl('get_vod_categories');
        else if(currentTab==='series') endpoint=apiUrl('get_series_categories');
        else if(currentTab==='sports'||currentTab==='kids') endpoint=apiUrl('get_live_categories');
        if(!endpoint) return;
        const data = await fetchAPI(endpoint);
        if(!data || !Array.isArray(data)) { container.innerHTML = '<div class="error-box">Error categorías</div>'; return; }
        categoriesData[currentTab]=data;
        renderCategories(data);
    }
    function renderCategories(cats) {
        let html='';
        for(const cat of cats){
            let catName=cat.category_name;
            if(currentTab==='sports' && !catName.toLowerCase().includes('sport')) continue;
            if(currentTab==='kids' && !catName.toLowerCase().includes('kid') && !catName.toLowerCase().includes('niño')) continue;
            html+=`<div class="category-modern" data-cat-id="${cat.category_id}"><div class="category-modern-header" onclick="toggleModernCategory(this)"><span>📁 ${escapeHtml(cat.category_name)}</span><span>▼</span></div><div class="category-modern-content"><div class="loading-spinner">Cargando...</div></div></div>`;
        }
        document.getElementById('categoriesContainer').innerHTML = html || '<div class="error-box">No hay categorías</div>';
        if(searchTerm) filterChannels();
        // También refrescar el sidebar flotante
        refreshFullscreenSidebar();
    }
    window.toggleModernCategory = function(header) {
        const parent = header.parentElement;
        const content = parent.querySelector('.category-modern-content');
        const isOpen = content.classList.contains('open');
        content.classList.toggle('open');
        if(!isOpen && content.querySelector('.loading-spinner')) {
            const catId = parent.getAttribute('data-cat-id');
            loadCategoryContent(catId, content);
        }
    };
    async function loadCategoryContent(categoryId, contentDiv) {
        if(currentServer.type === 'm3u') {
            const categoryName = categoriesData[currentTab].find(c=>c.category_id==categoryId)?.category_name;
            const channels = streamsCache[currentTab][categoryName];
            if(channels) renderChannelsModern(channels, contentDiv);
            return;
        }
        let endpoint='';
        if(currentTab==='live') endpoint=apiUrl('get_live_streams',`&category_id=${categoryId}`);
        else if(currentTab==='movies') endpoint=apiUrl('get_vod_streams',`&category_id=${categoryId}`);
        else if(currentTab==='series') endpoint=apiUrl('get_series',`&category_id=${categoryId}`);
        else endpoint=apiUrl('get_live_streams',`&category_id=${categoryId}`);
        const data = await fetchAPI(endpoint);
        if(!data || !Array.isArray(data)) { contentDiv.innerHTML='<p>Sin contenido</p>'; return; }
        if(currentTab==='series') { streamsCache[currentTab]=streamsCache[currentTab]||{}; streamsCache[currentTab][categoryId]=data; }
        renderChannelsModern(data, contentDiv);
    }
    function renderChannelsModern(items, container) {
        let html='<div>';
        for(const item of items){
            const name = escapeHtml(item.name || item.title || 'Sin nombre');
            let url='', isM3u8=false;
            if(currentServer.type==='m3u'){ url=item.url; isM3u8=url.includes('.m3u8'); }
            else if(currentTab==='live'||currentTab==='sports'||currentTab==='kids'){ url=`${currentServer.url}/live/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.m3u8`; isM3u8=true; }
            else if(currentTab==='movies'){ const ext=item.container_extension||'mp4'; url=`${currentServer.url}/movie/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.${ext}`; }
            else if(currentTab==='series'){
                html+=`<div class="channel-item" onclick='showSeriesEpisodesModern(${item.series_id}, "${name.replace(/'/g,"\\'")}")'><div class="channel-icon-small">📺</div><span>${name}</span><span>🎬</span></div>`;
                continue;
            }
            html+=`<div class="channel-item" data-url="${url.replace(/'/g,"\\'")}" data-name="${name.replace(/'/g,"\\'")}" data-ism3u8="${isM3u8}" onclick='playStreamModern(this.getAttribute("data-url"), this.getAttribute("data-name"), this.getAttribute("data-ism3u8")==="true")'><div>📡</div><span>${name}</span></div>`;
        }
        html+='</div>';
        container.innerHTML = html;
        if(searchTerm) filterChannels();
        refreshFullscreenSidebar();
    }
    window.showSeriesEpisodesModern = async function(seriesId, seriesName) {
        const container=document.getElementById('categoriesContainer');
        container.innerHTML='<div>Cargando episodios...</div>';
        const endpoint=apiUrl('get_series_info',`&series_id=${seriesId}`);
        const data=await fetchAPI(endpoint);
        if(!data||!data.episodes){ container.innerHTML=`<div>Error</div>`; return; }
        let html=`<div><button onclick="loadCategories()">◀ Volver</button><h3>${escapeHtml(seriesName)}</h3>`;
        const seasons=Object.keys(data.episodes).sort((a,b)=>parseInt(a)-parseInt(b));
        for(const s of seasons){
            html+=`<div class="category-modern"><div class="category-modern-header" onclick="toggleModernCategory(this)"><span>Temporada ${s}</span><span>▼</span></div><div class="category-modern-content">`;
            for(const ep of data.episodes[s]){
                const epName=escapeHtml(ep.title);
                const videoUrl=`${currentServer.url}/series/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${ep.id}.${ep.container_extension||'mp4'}`;
                html+=`<div class="channel-item" onclick='playStreamModern("${videoUrl.replace(/'/g,"\\'")}", "${escapeHtml(seriesName)} - ${epName.replace(/'/g,"\\'")}", false)'>🎞️ ${epName}</div>`;
            }
            html+=`</div></div>`;
        }
        html+=`</div>`;
        container.innerHTML=html;
    };

    // ========== REPRODUCTOR MEJORADO CON AUDIO/SUB TÍTULOS ==========
    const video = document.getElementById('video');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const rewindBtn = document.getElementById('rewindBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeDisplay = document.getElementById('currentTimeDisplay');
    const durationDisplay = document.getElementById('durationDisplay');
    const audioBtn = document.getElementById('audioBtn');
    const subsBtn = document.getElementById('subsBtn');
    const channelsBtnFS = document.getElementById('channelsBtnFS');
    const fullscreenSidebar = document.getElementById('fullscreenSidebar');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');

    let currentAudioTrack = null;
    let currentSubtitleTrack = null;

    function formatTime(sec) { if(isNaN(sec)) return "00:00"; const m=Math.floor(sec/60), s=Math.floor(sec%60); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function updateProgress() { if(video.duration){ progressFill.style.width=(video.currentTime/video.duration)*100+'%'; currentTimeDisplay.textContent=formatTime(video.currentTime); durationDisplay.textContent=formatTime(video.duration); } }
    video.addEventListener('timeupdate', updateProgress);
    video.addEventListener('loadedmetadata', ()=>{ durationDisplay.textContent=formatTime(video.duration); updateAudioSubsButtons(); });
    playPauseBtn.addEventListener('click', ()=>{ if(video.paused){ video.play(); playPauseBtn.innerHTML='⏸️ Pausa'; }else{ video.pause(); playPauseBtn.innerHTML='▶️ Play'; } });
    rewindBtn.addEventListener('click', ()=>{ video.currentTime = Math.max(0, video.currentTime-10); });
    forwardBtn.addEventListener('click', ()=>{ video.currentTime = Math.min(video.duration, video.currentTime+10); });
    volumeSlider.addEventListener('input', (e)=>{ video.volume = e.target.value; });
    progressBar.addEventListener('click', (e)=>{ const rect=progressBar.getBoundingClientRect(); const percent=(e.clientX-rect.left)/rect.width; video.currentTime=percent*video.duration; });
    
    // Pantalla completa con sidebar flotante
    fullscreenBtn.addEventListener('click', ()=>{ const container = document.querySelector('.player-area'); if(!document.fullscreenElement) container.requestFullscreen().catch(e=>console.log(e)); else document.exitFullscreen(); });
    channelsBtnFS.addEventListener('click', ()=>{ fullscreenSidebar.classList.toggle('open'); });
    closeSidebarBtn.addEventListener('click', ()=>{ fullscreenSidebar.classList.remove('open'); });
    
    function refreshFullscreenSidebar() {
        const fsContainer = document.getElementById('fsCategoriesContainer');
        if(!fsContainer) return;
        const originalSidebar = document.getElementById('categoriesContainer');
        if(originalSidebar) fsContainer.innerHTML = originalSidebar.innerHTML;
        // Reasignar eventos a los canales dentro del sidebar flotante
        fsContainer.querySelectorAll('.channel-item').forEach(el => {
            const newEl = el.cloneNode(true);
            el.parentNode.replaceChild(newEl, el);
            newEl.addEventListener('click', (e) => {
                const url = newEl.getAttribute('data-url');
                const name = newEl.getAttribute('data-name');
                const isM3u8 = newEl.getAttribute('data-ism3u8') === 'true';
                if(url && name) playStreamModern(url, name, isM3u8);
                fullscreenSidebar.classList.remove('open');
            });
        });
        // También categorías expandibles
        fsContainer.querySelectorAll('.category-modern-header').forEach(header => {
            header.onclick = function() { toggleModernCategory(header); };
        });
    }
    
    // Detectar y mostrar pistas de audio y subtítulos
    function updateAudioSubsButtons() {
        if(video.audioTracks && video.audioTracks.length) {
            let tracks = [];
            for(let i=0; i<video.audioTracks.length; i++) {
                let track = video.audioTracks[i];
                tracks.push({label: track.label || `Idioma ${i+1}`, id: i, lang: track.language});
                if(track.enabled) currentAudioTrack = i;
            }
            if(tracks.length) {
                audioBtn.innerHTML = `🎤 Audio: ${tracks.find(t=>t.id===currentAudioTrack)?.label || '?'}`;
                audioBtn.onclick = () => {
                    let menu = tracks.map((t,i)=>`${i}: ${t.label}`).join('\n');
                    let idx = prompt(`Selecciona pista de audio:\n${menu}\nNúmero:`, currentAudioTrack);
                    if(idx!==null && video.audioTracks[parseInt(idx)]) {
                        for(let i=0; i<video.audioTracks.length; i++) video.audioTracks[i].enabled = (i===parseInt(idx));
                        currentAudioTrack = parseInt(idx);
                        audioBtn.innerHTML = `🎤 Audio: ${video.audioTracks[currentAudioTrack].label}`;
                    }
                };
            } else audioBtn.innerHTML = `🎤 Audio: sin pistas`;
        } else audioBtn.innerHTML = `🎤 Audio: no disponible`;
        
        if(video.textTracks && video.textTracks.length) {
            let subs = [];
            for(let i=0; i<video.textTracks.length; i++) {
                let t = video.textTracks[i];
                if(t.kind === 'subtitles' || t.kind === 'captions') {
                    subs.push({label: t.label || `Subtítulo ${i+1}`, id: i, mode: t.mode});
                }
            }
            if(subs.length) {
                subsBtn.innerHTML = `📄 Subtítulos: ${currentSubtitleTrack!==null ? subs.find(s=>s.id===currentSubtitleTrack)?.label : 'Off'}`;
                subsBtn.onclick = () => {
                    let menu = subs.map((s,i)=>`${i}: ${s.label}`).join('\n');
                    let idx = prompt(`Selecciona subtítulo:\n${menu}\n-1 para desactivar:`, currentSubtitleTrack!==null?currentSubtitleTrack:-1);
                    if(idx!==null) {
                        for(let i=0; i<video.textTracks.length; i++) video.textTracks[i].mode = 'disabled';
                        if(parseInt(idx)>=0 && video.textTracks[parseInt(idx)]) {
                            video.textTracks[parseInt(idx)].mode = 'showing';
                            currentSubtitleTrack = parseInt(idx);
                            subsBtn.innerHTML = `📄 Subtítulos: ${video.textTracks[currentSubtitleTrack].label}`;
                        } else {
                            currentSubtitleTrack = null;
                            subsBtn.innerHTML = `📄 Subtítulos: Off`;
                        }
                    }
                };
            } else subsBtn.innerHTML = `📄 Subtítulos: no disponibles`;
        } else subsBtn.innerHTML = `📄 Subtítulos: no disponibles`;
    }
    
    window.playStreamModern = function(url, title, isM3u8) {
        if(parentalLock && !checkParentalUnlock()) return;
        if(hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();
        document.getElementById('currentTitle').innerHTML = `Cargando: ${title}...`;
        video.volume = volumeSlider.value;
        if(isM3u8 && Hls.isSupported()) {
            const hls = new Hls({ enableWorker: true, debug: false });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().then(()=>{ playPauseBtn.innerHTML='⏸️ Pausa'; }).catch(e=>console.log);
                document.getElementById('currentTitle').innerHTML = `▶️ ${title}`;
                // Intentar detectar pistas de audio en HLS (solo algunas funcionan)
                if(hls.audioTracks && hls.audioTracks.length) {
                    let tracks = hls.audioTracks.map((t,i)=>({label: t.name || `Audio ${i}`, id: i}));
                    audioBtn.innerHTML = `🎤 Audio: ${tracks[0]?.label || '?'}`;
                    audioBtn.onclick = () => {
                        let menu = tracks.map(t=>`${t.id}: ${t.label}`).join('\n');
                        let idx = prompt(`Selecciona audio (HLS):\n${menu}`, 0);
                        if(idx!==null && hls.audioTracks[parseInt(idx)]) { hls.audioTrack = parseInt(idx); audioBtn.innerHTML = `🎤 Audio: ${hls.audioTracks[parseInt(idx)].name}`; }
                    };
                }
            });
            hls.on(Hls.Events.ERROR, (e,d)=>{ if(d.fatal) document.getElementById('currentTitle').innerHTML = `❌ Error en ${title}`; });
            hlsPlayer = hls;
        } else {
            video.src = url;
            video.play().then(()=>{ playPauseBtn.innerHTML='⏸️ Pausa'; }).catch(e=>document.getElementById('currentTitle').innerHTML = `🔊 ${title} (toca play)`);
            document.getElementById('currentTitle').innerHTML = `▶️ ${title}`;
            video.addEventListener('loadedmetadata', updateAudioSubsButtons, {once:true});
        }
    };
    
    function filterChannels() { const term=searchTerm.toLowerCase(); document.querySelectorAll('.channel-item').forEach(i=>{ const n=i.querySelector('span')?.innerText||''; i.style.display=n.toLowerCase().includes(term)?'flex':'none'; }); }
    document.getElementById('searchInput').addEventListener('input', e=>{ searchTerm=e.target.value; filterChannels(); });
    async function switchTab(tab) { currentTab=tab; document.querySelectorAll('.top-cat').forEach(t=>t.classList.remove('active')); document.querySelector(`.top-cat[data-tab="${tab}"]`).classList.add('active'); searchTerm=''; document.getElementById('searchInput').value=''; await loadCategories(); }
    document.querySelectorAll('.top-cat').forEach(cat=>cat.addEventListener('click',()=>switchTab(cat.getAttribute('data-tab'))));
    
    function showServerManager() { /* modal igual que antes */ alert("Gestión de servidores: botón +LISTA"); }
    function showAddServerModal() { alert("Añadir servidor (código completo tiene la función)"); }
    function showQRInstallModal() { alert("QR"); }
    function checkParentalUnlock() { if(parentalLock){ let pwd=prompt("Contraseña:"); if(pwd===parentalPassword){ parentalLock=false; saveFullData(); return true; }else{ alert("Incorrecta"); return false; } } return true; }
    function showParentalSettings() { let pwd=prompt("Nueva contraseña:"); if(pwd&&pwd.length>=4){ parentalPassword=pwd; parentalLock=!parentalLock; saveFullData(); alert("Actualizado"); } }
    function updateClock() { document.getElementById('clock').innerHTML=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
    updateClock(); setInterval(updateClock,1000);
    document.getElementById('addBtn').onclick=()=>showAddServerModal();
    document.getElementById('serverBtn').onclick=()=>showServerManager();
    document.getElementById('parentalBtn').onclick=()=>showParentalSettings();
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    loadServers();
</script>
</body>
</html>
