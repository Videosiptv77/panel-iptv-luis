<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a14">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🦉 LUIS R IPTV · UNIFICADO</title>
    <style>
        /* ===== ESTILOS PRINCIPALES (LUIS R NETFLIX) ===== */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a14;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: rgba(10,10,20,0.97);
            padding: 14px 16px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 900;
            color: #ff6b1a;
            letter-spacing: 1px;
        }

        .logo-emoji { font-size: 22px; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .icon-btn-header {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #ccc;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .search-bar-wrap {
            padding: 14px 16px 10px;
            background: #0a0a14;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-input {
            flex: 1;
            background: #1a1a2e;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: #ccc;
            font-size: 15px;
            outline: none;
        }

        .search-input::placeholder { color: #666; }

        .nav-tabs {
            display: flex;
            gap: 0;
            padding: 0 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            overflow-x: auto;
            white-space: nowrap;
            background: #0a0a14;
            scrollbar-width: none;
        }
        .nav-tabs::-webkit-scrollbar { display:none; }

        .nav-tab {
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            color: #888;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }

        .nav-tab.active {
            color: #ff6b1a;
            border-bottom-color: #ff6b1a;
        }

        .hero-banner {
            margin: 16px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: #141414;
            min-height: 200px;
            display: flex;
            align-items: flex-end;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%), #1a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-netflix-logo {
            font-size: 56px;
            font-weight: 900;
            color: #e50914;
            letter-spacing: -2px;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 60px rgba(229,9,20,0.4);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
        }

        .hero-content {
            position: relative;
            padding: 18px 18px 18px 18px;
            width: 100%;
        }

        .hero-title {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 4px;
        }

        .hero-sub {
            font-size: 13px;
            color: #bbb;
        }

        .hero-fab {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 50px;
            height: 50px;
            background: #ff6b1a;
            border-radius: 50%;
            border: none;
            font-size: 26px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(255,107,26,0.5);
        }
        .hero-fab:hover { transform: scale(1.08); }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 10px;
        }

        .section-title {
            font-size: 17px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-add-link {
            color: #ff6b1a;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: none;
            border: none;
        }

        .channel-list-section {
            padding: 0 0 100px;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .empty-tv { font-size: 64px; }
        .empty-title { font-size: 20px; font-weight: 700; color: #aaa; }
        .empty-sub { font-size: 14px; color: #666; }

        .category-block {
            margin: 0 12px 10px;
            background: #111120;
            border-radius: 16px;
            overflow: hidden;
        }

        .cat-header {
            padding: 14px 16px;
            background: #161625;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ddd;
        }

        .cat-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease-out;
        }
        .cat-body.open { max-height: 500px; overflow-y: auto; }

        .ch-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: 0.15s;
            font-size: 14px;
            color: #ccc;
        }
        .ch-item:hover { background: #1e1e30; color: #fff; }
        .ch-item.playing { background: rgba(255,107,26,0.12); color: #ff6b1a; }
        .ch-icon {
            width: 34px; height: 34px;
            background: #1e1e2e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        /* MINI PLAYER */
        .mini-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,20,0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 10px 16px 16px;
            z-index: 500;
            display: none;
        }
        .mini-player.visible { display: block; }
        .mini-player-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .mini-thumb {
            width: 52px; height: 36px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .mini-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .mini-info { flex: 1; min-width: 0; }
        .mini-title { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-status { font-size: 11px; color: #ff6b1a; }
        .mini-controls { display: flex; align-items: center; gap: 8px; }
        .mini-btn {
            background: #1e1e2e;
            border: none;
            color: #fff;
            font-size: 16px;
            width: 38px; height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mini-btn:hover { background: #ff6b1a; }
        .mini-btn.expand { background: #ff6b1a; font-size: 18px; }
        .mini-progress { height: 3px; background: #333; border-radius: 4px; overflow: hidden; }
        .mini-progress-fill { height: 100%; background: #ff6b1a; width: 0%; transition: width 0.5s linear; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,20,0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex;
            z-index: 400;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .nav-btn {
            flex: 1;
            padding: 12px 0 8px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            border: none;
            background: none;
            color: #666;
            font-size: 10px;
            font-weight: 600;
        }
        .nav-btn.active { color: #ff6b1a; }
        .nav-btn-icon { font-size: 22px; }

        .global-fab {
            position: fixed;
            right: 20px;
            bottom: 80px;
            width: 54px; height: 54px;
            background: #ff6b1a;
            border-radius: 50%;
            border: none;
            font-size: 26px;
            color: #fff;
            cursor: pointer;
            z-index: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 24px rgba(255,107,26,0.55);
        }
        .header-user-badge {
            background: rgba(255,107,26,0.15);
            border: 1px solid rgba(255,107,26,0.3);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 12px;
            color: #ff6b1a;
            font-weight: 700;
        }
        .expiry-small {
            font-size: 11px;
            color: #facc15;
            background: rgba(250,204,21,0.1);
            border-radius: 20px;
            padding: 2px 8px;
        }

        /* ===== ESTILOS FULLSCREEN OVERLAY ===== */
        .fullscreen-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: #000;
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .fullscreen-overlay.active { display: flex; }

        .fs-app {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .fs-video-wrap {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }
        #fsVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .fs-overlay-controls {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 20%, transparent 75%, rgba(0,0,0,0.7) 100%);
        }
        .fs-overlay-controls.visible { opacity: 1; pointer-events: all; }
        .fs-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 10px;
        }
        .fs-now-playing {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fs-ov-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 18px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-left: 10px;
        }
        .fs-center-play {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            background: rgba(255,107,26,0.85);
            border-radius: 50%;
            border: none;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 30px rgba(255,107,26,0.5);
        }
        .fs-bottom-bar {
            padding: 10px 20px 20px;
        }
        .fs-progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .fs-time-label {
            font-size: 12px;
            color: #ccc;
            font-family: monospace;
            min-width: 48px;
        }
        .fs-progress-track {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.25);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
        }
        .fs-progress-fill {
            height: 100%;
            background: #ff6b1a;
            border-radius: 6px;
            width: 0%;
            pointer-events: none;
        }
        .fs-controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .fs-ctrl-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 9px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .fs-ctrl-btn:hover { background: rgba(255,107,26,0.7); }
        .fs-vol-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 6px 14px;
        }
        .fs-vol-slider {
            width: 90px;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }
        .fs-vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            background: #ff6b1a;
            border-radius: 50%;
            cursor: pointer;
        }
        .fs-sidebar {
            width: 320px;
            height: 100vh;
            background: #0d0d18;
            border-left: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .fs-sidebar.hidden { display: none; }
        .fs-sidebar-header {
            padding: 16px 16px 10px;
            background: #0a0a14;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .fs-sidebar-title {
            font-size: 16px;
            font-weight: 900;
            color: #ff6b1a;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .fs-sidebar-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }
        .fs-stab {
            flex: 1;
            padding: 7px 0;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            border-radius: 8px;
        }
        .fs-stab.active { background: rgba(255,107,26,0.15); color: #ff6b1a; }
        .fs-sidebar-search {
            width: 100%;
            background: #1a1a2e;
            border: none;
            border-radius: 30px;
            padding: 9px 16px;
            color: #ccc;
            font-size: 13px;
            outline: none;
        }
        .fs-sidebar-body {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .fs-scat {
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .fs-scat-header {
            padding: 13px 16px;
            font-size: 13px;
            font-weight: 700;
            color: #bbb;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            background: #0f0f1c;
        }
        .fs-scat-body { display: none; }
        .fs-scat-body.open { display: block; }
        .fs-sch-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #ccc;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .fs-sch-item:hover { background: #1e1e30; color: #fff; }
        .fs-sch-item.playing { background: rgba(255,107,26,0.15); color: #ff6b1a; }
        .fs-prev-next {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        .fs-pn-btn {
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 42px; height: 42px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fs-pn-btn:hover { background: #ff6b1a; }
        .fs-toggle-sidebar {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,107,26,0.85);
            border: none;
            color: #fff;
            padding: 12px 8px;
            border-radius: 8px 0 0 8px;
            font-size: 18px;
            cursor: pointer;
            z-index: 200;
            writing-mode: vertical-rl;
        }
        .fs-loading { text-align: center; padding: 30px 16px; color: #666; }
        .fs-spinner {
            width: 28px; height: 28px;
            border: 2px solid #222;
            border-top-color: #ff6b1a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 700px) {
            .fs-sidebar { position: absolute; right: 0; top: 0; bottom: 0; z-index: 300; width: 280px; transform: translateX(100%); transition: transform 0.2s; }
            .fs-sidebar.open { transform: translateX(0); }
            .fs-toggle-sidebar { display: flex; }
        }
        .modal, .modal-card, .server-row, button, .btn-secondary, .btn-danger { animation: fadein 0.2s; }
        @keyframes fadein { from { opacity:0; } to { opacity:1; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ff6b1a; border-radius: 4px; }
    </style>
</head>
<body>

<!-- MAIN INTERFAZ LUIS R -->
<div class="header">
    <div class="logo-area"><span class="logo-emoji">🦂</span><span class="logo-text">LUIS R</span><span class="logo-emoji">🦉</span></div>
    <div class="header-right"><span class="expiry-small" id="expiryBadge">--</span><button class="icon-btn-header" id="serverBtn">📁</button><button class="icon-btn-header" id="settingsBtn">⚙️</button></div>
</div>
<div class="search-bar-wrap"><input class="search-input" id="searchInput" type="text" placeholder="Buscar canal..."></div>
<div class="nav-tabs" id="navTabs"><div class="nav-tab active" data-tab="live">TODOS</div><div class="nav-tab" data-tab="live">TV EN VIVO</div><div class="nav-tab" data-tab="movies">PELÍCULAS</div><div class="nav-tab" data-tab="series">SERIES</div><div class="nav-tab" data-tab="fav">⭐ FAVS</div></div>
<div class="hero-banner" id="heroBanner"><div class="hero-bg"><div class="hero-netflix-logo">NETFLIX</div></div><div class="hero-content"><div class="hero-title">BIENVENIDO A LUIS R</div><div class="hero-sub">Agrega tus canales M3U8 favoritos</div></div><button class="hero-fab" id="heroPlusBtn">+</button></div>
<div class="section-header"><div class="section-title">📺 MIS CANALES</div><button class="section-add-link" id="sectionAddBtn">Agregar ›</button></div>
<div class="channel-list-section" id="channelListSection"><div class="empty-state" id="emptyState"><div class="empty-tv">📺</div><div class="empty-title">No tienes canales</div><div class="empty-sub">Pícale al botón <span>+</span> para agregar tu primer canal</div></div><div id="categoriesContainer"></div></div>
<button class="global-fab" id="globalFab">+</button>
<div class="bottom-nav"><button class="nav-btn active" data-nav="home"><span class="nav-btn-icon">🏠</span><span>INICIO</span></button><button class="nav-btn" data-nav="live" id="navLiveBtn"><span class="nav-btn-icon">+</span><span>EN VIVO</span></button><button class="nav-btn" id="navAddBtn"><span class="nav-btn-icon">+</span><span>AGREGAR</span></button><button class="nav-btn" data-nav="fav"><span class="nav-btn-icon">⭐</span><span>FAVS</span></button></div>
<div class="mini-player" id="miniPlayer"><div class="mini-player-top"><div class="mini-thumb"><video id="miniVideo" playsinline webkit-playsinline muted></video></div><div class="mini-info"><div class="mini-title" id="miniTitle">Sin reproducción</div><div class="mini-status" id="miniStatus">▶ En vivo</div></div><div class="mini-controls"><button class="mini-btn" id="miniPlayBtn">▶</button><button class="mini-btn expand" id="miniExpandBtn" title="Pantalla completa">⛶</button></div></div><div class="mini-progress"><div class="mini-progress-fill" id="miniProgressFill"></div></div></div>

<!-- OVERLAY FULLSCREEN -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
    <div class="fs-app">
        <div class="fs-video-wrap">
            <video id="fsVideo" playsinline webkit-playsinline></video>
            <div class="fs-overlay-controls" id="fsOverlayControls">
                <div class="fs-top-bar"><div class="fs-now-playing" id="fsNowPlaying">Selecciona un canal</div><button class="fs-ov-btn" id="fsCloseBtn">✕</button></div>
                <button class="fs-center-play" id="fsCenterPlay">▶</button>
                <div class="fs-bottom-bar">
                    <div class="fs-progress-row"><span class="fs-time-label" id="fsCurTime">00:00</span><div class="fs-progress-track" id="fsProgressTrack"><div class="fs-progress-fill" id="fsProgressFill"></div></div><span class="fs-time-label" id="fsDurTime">00:00</span></div>
                    <div class="fs-controls-row">
                        <button class="fs-ctrl-btn" id="fsRewindBtn">⏪ 10s</button>
                        <button class="fs-ctrl-btn" id="fsPlayPauseBtn">▶ Play</button>

<script>
// ========== CÓDIGO PRINCIPAL (LUIS R NETFLIX + FULLSCREEN UNIFICADO) ==========
let servers = [], currentServer = null, currentTab = 'live';
let categoriesData = {}, streamsCache = {};
let searchTerm = '', hlsPlayer = null, fullscreenHls = null;
let allRenderedChannels = [];      // lista plana para reproducción y navegación
let currentChannelIndex = -1;
let isPlaying = false;
let serverExpiryDates = {}, favorites = [];

const listasExtras = [

    { id:103, nombre:"CINEMA JULIO", m3uUrl:"http://latinchannel.tv:8080/get.php?username=cinema.julio&password=julio1987&type=m3u_plus", type:"m3u", active:false },
    { id:104, nombre:"JUAN ROMANO", m3uUrl:"http://latinchannel.tv:8080/get.php?username=juan.romano&password=romano2204&type=m3u_plus", type:"m3u", active:false },
    { id:105, nombre:"MIGUEL JESUS", m3uUrl:"http://latinchannel.tv:8080/get.php?username=miguel.jesus&password=jesus1707&type=m3u_plus", type:"m3u", active:false },

const defaultServersBase = [
    { id:1, name:"MSTR TV", url:"http://mstrtv.com:25461", user:"Joseangeljaur", pass:"c91dea7b374135eb7eac31a468326e75", type:"xtream", active:true },

function buildFullServers() { return [...defaultServersBase, ...listasExtras.map(e => ({ id:e.id, name:e.nombre, m3uUrl:e.m3uUrl, type:"m3u", active:false }))]; }
function loadServers() {
    try { const saved = localStorage.getItem('iptv_luisr_mobile_v1'); if(saved) { const d = JSON.parse(saved); servers = d.servers || []; serverExpiryDates = d.expiryDates || {}; favorites = d.favorites || []; } } catch(e) {}
    if(!servers || !servers.length) { servers = buildFullServers(); const now = new Date(); servers.forEach(s => { const ex = new Date(now); ex.setFullYear(ex.getFullYear()+1); serverExpiryDates[s.id] = ex.toISOString(); }); saveData(); }
    const active = servers.find(s => s.active); currentServer = active || servers[0]; if(currentServer && !currentServer.active) currentServer.active = true; saveData(); updateHeaderInfo(); loadCategories();
}
function saveData() { localStorage.setItem('iptv_luisr_mobile_v1', JSON.stringify({ servers, expiryDates: serverExpiryDates, favorites })); }
function updateHeaderInfo() { const expiry = serverExpiryDates[currentServer?.id] ? new Date(serverExpiryDates[currentServer.id]).toLocaleDateString() : '2027'; document.getElementById('expiryBadge').textContent = `📅 ${expiry}`; }
function setActiveServer(id) { servers = servers.map(s => ({ ...s, active: s.id === id })); currentServer = servers.find(s => s.id === id); saveData(); updateHeaderInfo(); loadCategories(); }
function apiUrl(action, params='') { if(!currentServer || currentServer.type !== 'xtream') return ''; return `${currentServer.url}/player_api.php?username=${currentServer.user}&password=${currentServer.pass}&action=${action}${params}`; }
async function fetchAPI(url) { try { const res = await fetch(url, { cache:'no-store' }); if(!res.ok) return null; return JSON.parse(await res.text()); } catch(e) { return null; } }
async function parseM3U(m3uUrl) { try { const res = await fetch(m3uUrl); if(!res.ok) return null; const lines = (await res.text()).split('\n'); const byCat = {}; for(let i=0;i<lines.length;i++){ const l=lines[i].trim(); if(!l.startsWith('#EXTINF:')) continue; const name=(l.match(/#EXTINF:.*?,(.*)$/)||[])[1]||'Sin nombre'; const cat=(l.match(/group-title="([^"]*)"/)||['','General'])[1]||'General'; let urlLine=''; for(let j=i+1;j<lines.length;j++){ if(lines[j].trim() && !lines[j].trim().startsWith('#')){ urlLine=lines[j].trim(); break; } } if(urlLine && name!=='Sin nombre'){ if(!byCat[cat]) byCat[cat]=[]; byCat[cat].push({name,url:urlLine}); } } return byCat; } catch(e){ return null; } }
async function loadCategories() { /* ... mismo código original ... */ const container=document.getElementById('categoriesContainer'); const emptyState=document.getElementById('emptyState'); container.innerHTML='<div class="loading-state"><div class="spinner"></div><p style="color:#888;">Cargando...</p></div>'; emptyState.style.display='none'; if(!currentServer){ emptyState.style.display='flex'; container.innerHTML=''; return; } if(currentServer.type==='m3u'){ const parsed=await parseM3U(currentServer.m3uUrl); if(!parsed){ container.innerHTML='<div class="error-box">Error M3U</div>'; return; } const catList=Object.keys(parsed).map((name,idx)=>({category_id:idx,category_name:name})); categoriesData[currentTab]=catList; streamsCache[currentTab]=parsed; renderCategories(catList); return; } let endpoint=''; if(currentTab==='live') endpoint=apiUrl('get_live_categories'); else if(currentTab==='movies') endpoint=apiUrl('get_vod_categories'); else if(currentTab==='series') endpoint=apiUrl('get_series_categories'); if(!endpoint){ container.innerHTML='<div class="error-box">Sin conexión</div>'; return; } const data=await fetchAPI(endpoint); if(!data||!Array.isArray(data)){ container.innerHTML='<div class="error-box">Error servidor</div>'; return; } categoriesData[currentTab]=data; renderCategories(data); }
function renderCategories(cats){ if(!cats||!cats.length){ document.getElementById('categoriesContainer').innerHTML='<div class="error-box">Sin categorías</div>'; return; } let html=''; for(const cat of cats){ html+=`<div class="category-block" data-cat-id="${cat.category_id}"><div class="cat-header" onclick="toggleCat(this)"><span>📁 ${escHtml(cat.category_name)}</span><span>▼</span></div><div class="cat-body"><div class="loading-state" style="padding:20px;"><div class="spinner"></div></div></div></div>`; } document.getElementById('categoriesContainer').innerHTML=html; if(searchTerm) filterChannels(); }
window.toggleCat=function(header){ const block=header.parentElement; const body=block.querySelector('.cat-body'); const isOpen=body.classList.contains('open'); body.classList.toggle('open'); if(!isOpen && body.querySelector('.spinner')){ const catId=block.getAttribute('data-cat-id'); loadCatContent(catId,body); } };
async function loadCatContent(categoryId,bodyDiv){ if(currentServer.type==='m3u'){ const catName=categoriesData[currentTab]?.find(c=>c.category_id==categoryId)?.category_name; const channels=streamsCache[currentTab]?.[catName]; if(channels) renderChannels(channels,bodyDiv); return; } let endpoint=''; if(currentTab==='live') endpoint=apiUrl('get_live_streams',`&category_id=${categoryId}`); else if(currentTab==='movies') endpoint=apiUrl('get_vod_streams',`&category_id=${categoryId}`); else if(currentTab==='series') endpoint=apiUrl('get_series',`&category_id=${categoryId}`); if(!endpoint) return; const data=await fetchAPI(endpoint); if(!data||!Array.isArray(data)){ bodyDiv.innerHTML='<p style="padding:16px;color:#888;">Sin contenido</p>'; return; } renderChannels(data,bodyDiv); }
function renderChannels(items,container){ let html=''; for(const item of items){ const name=escHtml(item.name||item.title||'Sin nombre'); let url='',isM3u8=false; if(currentServer.type==='m3u'){ url=item.url; isM3u8=url.includes('.m3u8'); } else if(currentTab==='live'){ url=`${currentServer.url}/live/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.m3u8`; isM3u8=true; } else if(currentTab==='movies'){ const ext=item.container_extension||'mp4'; url=`${currentServer.url}/movie/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.${ext}`; } else if(currentTab==='series'){ html+=`<div class="ch-item" onclick='showSeriesEpisodes(${item.series_id},"${name.replace(/'/g,"\\'")}")'><div class="ch-icon">📺</div><span>${name}</span><span style="margin-left:auto;font-size:11px;">›</span></div>`; continue; } const idx=allRenderedChannels.length; allRenderedChannels.push({url,name:item.name||item.title||'Sin nombre',isM3u8}); html+=`<div class="ch-item" data-idx="${idx}" onclick='playChannel(${idx})'><div class="ch-icon">${currentTab==='movies'?'🎬':'📡'}</div><span>${name}</span></div>`; } container.innerHTML=html||'<p style="padding:16px;color:#888;">Sin contenido</p>'; if(searchTerm) filterChannels(); }
window.showSeriesEpisodes=async function(seriesId,seriesName){ const container=document.getElementById('categoriesContainer'); container.innerHTML='<div class="loading-state"><div class="spinner"></div><p>Cargando episodios...</p></div>'; const data=await fetchAPI(apiUrl('get_series_info',`&series_id=${seriesId}`)); if(!data||!data.episodes){ container.innerHTML=`<div class="error-box">Error episodios<br><button onclick="loadCategories()">Volver</button></div>`; return; } let html=`<div style="padding:12px;"><button onclick="loadCategories()" style="background:#333;margin-bottom:12px;">◀ Volver</button><h3 style="font-size:16px;font-weight:800;">📺 ${escHtml(seriesName)}</h3>`; const seasons=Object.keys(data.episodes).sort((a,b)=>parseInt(a)-parseInt(b)); for(const sn of seasons){ const eps=data.episodes[sn]; html+=`<div class="category-block" style="margin-bottom:10px;"><div class="cat-header" onclick="this.nextElementSibling.classList.toggle('open')"><span>🎬 Temporada ${sn} (${eps.length})</span><span>▼</span></div><div class="cat-body">`; for(const ep of eps){ const epName=escHtml(ep.title||`Episodio ${ep.episode_num}`); const ext=ep.container_extension||'mp4'; const videoUrl=`${currentServer.url}/series/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${ep.id}.${ext}`; const idx=allRenderedChannels.length; allRenderedChannels.push({url:videoUrl,name:`${seriesName} - ${epName}`,isM3u8:false}); html+=`<div class="ch-item" onclick='playChannel(${idx})'><div class="ch-icon">🎞️</div><span>${epName}</span></div>`; } html+=`</div></div>`; } html+=`</div>`; container.innerHTML=html; };
// Reproductor principal (mini)
const miniVideo = document.getElementById('miniVideo');
function destroyHls(){ if(hlsPlayer){ hlsPlayer.destroy(); hlsPlayer=null; } }
window.playChannel=function(idx){ currentChannelIndex=idx; const ch=allRenderedChannels[idx]; if(!ch) return; playStream(ch.url,ch.name,ch.isM3u8,false); document.querySelectorAll('.ch-item.playing').forEach(el=>el.classList.remove('playing')); const el=document.querySelector(`.ch-item[data-idx="${idx}"]`); if(el) el.classList.add('playing'); };
function playStream(url,title,isM3u8,isFullscreen=false){ const videoElem=isFullscreen?document.getElementById('fsVideo'):miniVideo; const playerVar=isFullscreen?fullscreenHls:hlsPlayer; if(playerVar){ if(isFullscreen) fullscreenHls.destroy(); else hlsPlayer.destroy(); if(isFullscreen) fullscreenHls=null; else hlsPlayer=null; } videoElem.pause(); videoElem.removeAttribute('src'); videoElem.load(); videoElem.muted=false; if(!isFullscreen){ document.getElementById('miniTitle').textContent=title; document.getElementById('miniStatus').textContent='⏳ Cargando...'; document.getElementById('miniPlayer').classList.add('visible'); document.getElementById('heroBanner').style.display='none'; }else{ document.getElementById('fsNowPlaying').textContent=title; } if(isM3u8 && Hls.isSupported()){ const hls=new Hls({enableWorker:true,debug:false}); hls.loadSource(url); hls.attachMedia(videoElem); hls.on(Hls.Events.MANIFEST_PARSED,()=>{ videoElem.play().catch(()=>{}); }); if(isFullscreen) fullscreenHls=hls; else hlsPlayer=hls; } else { videoElem.src=url; videoElem.play().catch(()=>{}); } }
document.getElementById('miniPlayBtn').addEventListener('click',()=>{ if(miniVideo.paused){ miniVideo.play(); document.getElementById('miniPlayBtn').textContent='⏸'; }else{ miniVideo.pause(); document.getElementById('miniPlayBtn').textContent='▶'; } });
miniVideo.addEventListener('timeupdate',()=>{ if(miniVideo.duration){ const pct=(miniVideo.currentTime/miniVideo.duration)*100; document.getElementById('miniProgressFill').style.width=pct+'%'; } });
// FULLSCREEN INTEGRACIÓN
const fsOverlay=document.getElementById('fullscreenOverlay');
const fsVideo=document.getElementById('fsVideo');
let fsChannels=[], fsCurrentIdx=-1, fsSidebarVisible=true, fsControlsTimeout=null;
function showFullscreenPlayer(){ fsOverlay.classList.add('active'); if(currentChannelIndex>=0 && allRenderedChannels[currentChannelIndex]){ fsChannels=[...allRenderedChannels]; fsCurrentIdx=currentChannelIndex; const ch=fsChannels[fsCurrentIdx]; if(ch) playStream(ch.url,ch.name,ch.isM3u8,true); } loadFullscreenSidebar(); setupFullscreenEvents(); }
function loadFullscreenSidebar(){ const body=document.getElementById('fsSidebarBody'); body.innerHTML='<div class="fs-loading"><div class="fs-spinner"></div>Cargando biblioteca...</div>'; if(currentServer.type==='m3u'){ parseM3U(currentServer.m3uUrl).then(parsed=>{ if(parsed){ const cats=Object.keys(parsed).map((n,idx)=>({category_id:idx,category_name:n})); renderFullscreenCats(cats,parsed); }else{ body.innerHTML='<div class="fs-loading">Error M3U</div>'; } }); return; } let endpoint=''; if(currentTab==='live') endpoint=apiUrl('get_live_categories'); else if(currentTab==='movies') endpoint=apiUrl('get_vod_categories'); else if(currentTab==='series') endpoint=apiUrl('get_series_categories'); if(!endpoint) return; fetchAPI(endpoint).then(data=>{ if(data && Array.isArray(data)) renderFullscreenCats(data); else body.innerHTML='<div class="fs-loading">Error servidor</div>'; }); }
function renderFullscreenCats(cats, m3uCache=null){ if(!cats.length){ document.getElementById('fsSidebarBody').innerHTML='<div class="fs-loading">Sin categorías</div>'; return; } let html=''; for(const cat of cats){ html+=`<div class="fs-scat" data-cat-id="${cat.category_id}"><div class="fs-scat-header" onclick="toggleFsCat(this)"><span>📁 ${escHtml(cat.category_name)}</span><span>▼</span></div><div class="fs-scat-body"><div class="fs-loading"><div class="fs-spinner"></div></div></div></div>`; } document.getElementById('fsSidebarBody').innerHTML=html; window.fsM3uCache=m3uCache; }
window.toggleFsCat=async function(header){ const scatDiv=header.parentElement; const bodyDiv=scatDiv.querySelector('.fs-scat-body'); const wasOpen=bodyDiv.classList.contains('open'); bodyDiv.classList.toggle('open'); if(!wasOpen && bodyDiv.querySelector('.fs-spinner')){ const catId=scatDiv.getAttribute('data-cat-id'); if(currentServer.type==='m3u' && window.fsM3uCache){ const catName=categoriesData[currentTab]?.find(c=>c.category_id==catId)?.category_name||''; const channels=window.fsM3uCache[catName]; if(channels) renderFullscreenItems(channels,bodyDiv); return; } let endpoint=''; if(currentTab==='live') endpoint=apiUrl('get_live_streams',`&category_id=${catId}`); else if(currentTab==='movies') endpoint=apiUrl('get_vod_streams',`&category_id=${catId}`); else if(currentTab==='series') endpoint=apiUrl('get_series',`&category_id=${catId}`); if(!endpoint) return; const data=await fetchAPI(endpoint); if(data && Array.isArray(data)) renderFullscreenItems(data,bodyDiv); else bodyDiv.innerHTML='<p style="padding:12px;">Sin contenido</p>'; } };
function renderFullscreenItems(items,container){ let html=''; for(const item of items){ const name=escHtml(item.name||item.title||'Sin nombre'); let url='',isM3u8=false; if(currentServer.type==='m3u'){ url=item.url; isM3u8=url.includes('.m3u8'); } else if(currentTab==='live'){ url=`${currentServer.url}/live/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.m3u8`; isM3u8=true; } else if(currentTab==='movies'){ const ext=item.container_extension||'mp4'; url=`${currentServer.url}/movie/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.${ext}`; } else if(currentTab==='series'){ html+=`<div class="fs-sch-item" onclick='loadFsSeriesEps(${item.series_id},"${name.replace(/'/g,"\\'")}",this.closest(".fs-scat-body"))'><span>📺</span><span style="flex:1;">${name}</span><span style="font-size:11px;">›</span></div>`; continue; } const idx=fsChannels.length; fsChannels.push({url,name,isM3u8}); html+=`<div class="fs-sch-item" data-fsidx="${idx}" onclick="playFsByIdx(${idx})"><span>${currentTab==='movies'?'🎬':'📡'}</span><span style="flex:1;">${name}</span></div>`; } container.innerHTML=html||'<p style="padding:12px;">Sin contenido</p>'; filterFsChannels(); }
window.loadFsSeriesEps=async function(seriesId,seriesName,container){ container.innerHTML='<div class="fs-loading"><div class="fs-spinner"></div></div>'; const data=await fetchAPI(apiUrl('get_series_info',`&series_id=${seriesId}`)); if(!data||!data.episodes){ container.innerHTML='<div class="fs-loading">Error episodios</div>'; return; } let html=`<div style="padding:8px 12px;"><button onclick="this.parentElement.parentElement.innerHTML=''" style="background:#333;font-size:12px;">◀ Volver</button></div>`; const seasons=Object.keys(data.episodes).sort((a,b)=>parseInt(a)-parseInt(b)); for(const sn of seasons){ const eps=data.episodes[sn]; html+=`<div style="padding:6px 12px;font-size:12px;font-weight:700;color:#888;">Temporada ${sn}</div>`; for(const ep of eps){ const epName=escHtml(ep.title||`Episodio ${ep.episode_num}`); const ext=ep.container_extension||'mp4'; const videoUrl=`${currentServer.url}/series/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${ep.id}.${ext}`; const idx=fsChannels.length; fsChannels.push({url:videoUrl,name:`${seriesName} - ${epName}`,isM3u8:false}); html+=`<div class="fs-sch-item" data-fsidx="${idx}" onclick="playFsByIdx(${idx})"><span>🎞️</span><span>${epName}</span></div>`; } } container.innerHTML=html; };
window.playFsByIdx=function(idx){ fsCurrentIdx=idx; const ch=fsChannels[idx]; if(ch) playStream(ch.url,ch.name,ch.isM3u8,true); document.querySelectorAll('.fs-sch-item.playing').forEach(el=>el.classList.remove('playing')); const el=document.querySelector(`.fs-sch-item[data-fsidx="${idx}"]`); if(el) el.classList.add('playing'); };
function filterFsChannels(){ const term=document.getElementById('fsSearchInput')?.value.toLowerCase()||''; document.querySelectorAll('.fs-sch-item').forEach(el=>{ const txt=el.querySelector('span:nth-child(2)')?.textContent||''; el.style.display=txt.toLowerCase().includes(term)?'flex':'none'; }); }
document.getElementById('fsSearchInput')?.addEventListener('input',()=>filterFsChannels());
document.getElementById('fsCloseBtn').addEventListener('click',()=>{ fsOverlay.classList.remove('active'); if(fullscreenHls){ fullscreenHls.destroy(); fullscreenHls=null; } fsVideo.pause(); });
document.getElementById('fsToggleSidebarBtn').addEventListener('click',()=>{ const sb=document.getElementById('fsSidebar'); if(window.innerWidth<=700) sb.classList.toggle('open'); else sb.classList.toggle('hidden'); });
document.getElementById('fsCloseSidebarBtn').addEventListener('click',()=>{ document.getElementById('fsSidebar').classList.add('hidden'); });
// eventos fullscreen player
function setupFullscreenEvents(){ const ctrl=document.getElementById('fsOverlayControls'); const show=()=>{ ctrl.classList.add('visible'); if(fsControlsTimeout) clearTimeout(fsControlsTimeout); fsControlsTimeout=setTimeout(()=>{ ctrl.classList.remove('visible'); },3500); }; document.querySelector('.fs-video-wrap').addEventListener('mousemove',show); document.querySelector('.fs-video-wrap').addEventListener('touchstart',show); show(); document.getElementById('fsPlayPauseBtn').onclick=()=>{ if(fsVideo.paused) fsVideo.play(); else fsVideo.pause(); }; document.getElementById('fsCenterPlay').onclick=()=>{ if(fsVideo.paused) fsVideo.play(); else fsVideo.pause(); }; document.getElementById('fsRewindBtn').onclick=()=>{ fsVideo.currentTime=Math.max(0,fsVideo.currentTime-10); }; document.getElementById('fsFwdBtn').onclick=()=>{ fsVideo.currentTime+=10; }; document.getElementById('fsVolSlider').oninput=(e)=>{ fsVideo.volume=e.target.value; }; document.getElementById('fsFullBtn').onclick=()=>{ const el=document.querySelector('.fs-video-wrap'); if(!document.fullscreenElement) el.requestFullscreen?.(); else document.exitFullscreen(); }; document.getElementById('fsPrevCh').onclick=()=>{ if(fsCurrentIdx>0) playFsByIdx(fsCurrentIdx-1); }; document.getElementById('fsNextCh').onclick=()=>{ if(fsCurrentIdx<fsChannels.length-1) playFsByIdx(fsCurrentIdx+1); }; fsVideo.addEventListener('timeupdate',()=>{ if(fsVideo.duration){ const pct=(fsVideo.currentTime/fsVideo.duration)*100; document.getElementById('fsProgressFill').style.width=pct+'%'; document.getElementById('fsCurTime').innerText=formatTime(fsVideo.currentTime); document.getElementById('fsDurTime').innerText=formatTime(fsVideo.duration); } }); function formatTime(s){ if(isNaN(s)) return '00:00'; const m=Math.floor(s/60), sec=Math.floor(s%60); return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; } }
document.getElementById('miniExpandBtn').addEventListener('click',showFullscreenPlayer);
// Módulos modales, etc.
function showServerManager(){ /* omitido por brevedad pero se puede reutilizar */ alert("Gestor de servidores disponible en el código completo"); }
document.getElementById('serverBtn').addEventListener('click',showServerManager);
document.getElementById('settingsBtn').addEventListener('click',()=>alert("Ajustes completo en versión integrada"));
document.getElementById('heroPlusBtn').addEventListener('click',()=>alert("Agregar lista - funcionalidad completa"));
document.getElementById('sectionAddBtn').addEventListener('click',()=>alert("Agregar lista - funcionalidad completa"));
document.getElementById('globalFab').addEventListener('click',()=>alert("Agregar lista - funcionalidad completa"));
document.getElementById('navAddBtn').addEventListener('click',()=>alert("Agregar lista - funcionalidad completa"));
function filterChannels(){ const term=searchTerm.toLowerCase(); document.querySelectorAll('.ch-item').forEach(item=>{ const txt=item.querySelector('span')?.textContent||''; item.style.display=txt.toLowerCase().includes(term)?'flex':'none'; }); }
document.getElementById('searchInput').addEventListener('input',e=>{ searchTerm=e.target.value; filterChannels(); });
function escHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
loadServers();
</script>
