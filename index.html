<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    // ========== CONFIGURACIÓN GLOBAL ==========
    let servers = [];
    let currentServer = null;
    let currentTab = 'live';
    let categoriesData = {};
    let streamsCache = {};
    let seriesDataCache = {};
    let searchTerm = '';
    let hlsPlayer = null;
    let currentSeriesContext = null;
    
    // Control Parental
    let parentalLock = false;
    let parentalPassword = "1234";
    
    // Fechas simuladas
    let serverExpiryDates = {};
    
    // ========== LAS 7 LISTAS IPTV EXTRAÍDAS (exactamente como estaban) ==========
    const listasExtras = [
        { id: 101, nombre: "RAFAEL MAZZILLI", m3uUrl: "http://latinchannel.tv:8080/get.php?username=rafael.mazzilli&password=mazzilli1402&type=m3u_plus", type: "m3u", active: false },
        { id: 102, nombre: "JENNI PAOLA", m3uUrl: "http://latinchannel.tv:8080/get.php?username=jenni.paola&password=paola1707&type=m3u_plus", type: "m3u", active: false },
        { id: 103, nombre: "CINEMA JULIO", m3uUrl: "http://latinchannel.tv:8080/get.php?username=cinema.julio&password=julio1987&type=m3u_plus", type: "m3u", active: false },
        { id: 104, nombre: "JUAN ROMANO", m3uUrl: "http://latinchannel.tv:8080/get.php?username=juan.romano&password=romano2204&type=m3u_plus", type: "m3u", active: false },
        { id: 105, nombre: "MIGUEL JESUS", m3uUrl: "http://latinchannel.tv:8080/get.php?username=miguel.jesus&password=jesus1707&type=m3u_plus", type: "m3u", active: false },
        { id: 106, nombre: "ANA VALENTINA", m3uUrl: "http://latinchannel.tv:8080/get.php?username=ana.valentina&password=valentina1905&type=m3u_plus", type: "m3u", active: false },
        { id: 107, nombre: "ALISON", m3uUrl: "http://latinchannel.tv:8080/get.php?username=alison&password=151108&type=m3u_plus", type: "m3u", active: false }
    ];
    
    // Servidores por defecto (originales + las 7 listas)
    const defaultServersBase = [
        { id: 1, name: "MSTR TV", url: "http://mstrtv.com:25461", user: "Joseangeljaur", pass: "c91dea7b374135eb7eac31a468326e75", type: "xtream", active: true },
        { id: 2, name: "BSTV", url: "http://bstv.online:8080", user: "7876151421", pass: "7876151421", type: "xtream", active: false },
        { id: 3, name: "PLAY TV", url: "http://playtv44.com:8080", user: "MASTER", pass: "23423", type: "xtream", active: false },
        { id: 4, name: "TV LITE", url: "http://tvlite.xyz:8080", user: "claudiocalderon62725", pass: "M3zVt2nfwb", type: "xtream", active: false },
        { id: 5, name: "TECNOMOLLY", url: "http://app.tecnomolly.com:8080", user: "cesarjacobo2", pass: "gWVQ4n2UXZC4", type: "xtream", active: false }
    ];
    
    // Construir lista completa de servidores (originales + las 7 listas extra)
    function buildFullServers() {
        const all = [...defaultServersBase];
        for (let extra of listasExtras) {
            all.push({
                id: extra.id,
                name: extra.nombre,
                m3uUrl: extra.m3uUrl,
                type: "m3u",
                active: false
            });
        }
        return all;
    }
    
    function loadServers() {
        const saved = localStorage.getItem('iptv_luis_premium_v4');
        if(saved) {
            try {
                const data = JSON.parse(saved);
                servers = data.servers || [];
                serverExpiryDates = data.expiryDates || {};
                parentalPassword = data.parentalPassword || "1234";
                parentalLock = data.parentalLock || false;
            } catch(e) { servers = null; }
        }
        if(!servers || servers.length === 0) {
            servers = buildFullServers();
            const now = new Date();
            servers.forEach(s => {
                const expiry = new Date(now);
                expiry.setFullYear(expiry.getFullYear() + 1);
                serverExpiryDates[s.id] = expiry.toISOString();
            });
            saveFullData();
        }
        // Asegurar que el primer servidor activo sea el primero de la lista
        const active = servers.find(s => s.active);
        currentServer = active || servers[0];
        if (currentServer && !currentServer.active) {
            currentServer.active = true;
            saveFullData();
        }
        updateHeaderInfo();
        loadCategories();
    }
    
    function saveFullData() {
        localStorage.setItem('iptv_luis_premium_v4', JSON.stringify({
            servers: servers,
            expiryDates: serverExpiryDates,
            parentalPassword: parentalPassword,
            parentalLock: parentalLock
        }));
    }
    
    function updateHeaderInfo() {
        if(!currentServer) return;
        document.getElementById('serverName').innerText = currentServer.name;
        let userName = currentServer.user || (currentServer.type === 'm3u' ? 'M3U List' : currentServer.name);
        document.getElementById('activeUserName').innerText = userName;
        const expiry = serverExpiryDates[currentServer.id] ? new Date(serverExpiryDates[currentServer.id]).toLocaleDateString() : 'Abr 21, 2027';
        document.getElementById('expiryBadge').innerHTML = `Expiration: ${expiry}`;
    }
    
    function setActiveServer(id) {
        servers = servers.map(s => ({ ...s, active: s.id === id }));
        currentServer = servers.find(s => s.id === id);
        saveFullData();
        updateHeaderInfo();
        currentSeriesContext = null;
        loadCategories();
    }
    
    function deleteServer(id) {
        if(servers.length <= 1) { alert("Debe haber al menos un servidor"); return; }
        servers = servers.filter(s => s.id !== id);
        if(currentServer.id === id && servers.length) setActiveServer(servers[0].id);
        else saveFullData();
        loadCategories();
    }
    
    function apiUrl(action, params = '') {
        if(!currentServer || currentServer.type !== 'xtream') return '';
        return `${currentServer.url}/player_api.php?username=${currentServer.user}&password=${currentServer.pass}&action=${action}${params}`;
    }
    
    async function fetchAPI(url) {
        try {
            const res = await fetch(url, { cache: 'no-store' });
            if(!res.ok) return null;
            const text = await res.text();
            try { return JSON.parse(text); } catch(e) { return null; }
        } catch(e) { return null; }
    }
    
    async function parseM3U(m3uUrl) {
        try {
            const res = await fetch(m3uUrl);
            if(!res.ok) return null;
            const content = await res.text();
            const lines = content.split('\n');
            const channelsByCat = {};
            for(let i=0; i<lines.length; i++) {
                let line = lines[i].trim();
                if(line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/#EXTINF:.*?,(.*)$/);
                    const name = nameMatch ? nameMatch[1] : "Sin nombre";
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    let category = groupMatch ? groupMatch[1] : "General";
                    let urlLine = "";
                    for(let j=i+1; j<lines.length; j++) {
                        if(lines[j].trim() && !lines[j].trim().startsWith('#')) {
                            urlLine = lines[j].trim();
                            break;
                        }
                    }
                    if(urlLine && name !== "Sin nombre") {
                        if(!channelsByCat[category]) channelsByCat[category] = [];
                        channelsByCat[category].push({ name, url: urlLine });
                    }
                }
            }
            return channelsByCat;
        } catch(e) { return null; }
    }
    
    async function loadCategories() {
        if(parentalLock && !checkParentalUnlock()) return;
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Cargando biblioteca...</p></div>';
        
        if(currentServer.type === 'm3u') {
            const parsed = await parseM3U(currentServer.m3uUrl);
            if(!parsed) { container.innerHTML = '<div class="error-box">Error al cargar M3U</div>'; return; }
            const catList = Object.keys(parsed).map((name, idx) => ({ category_id: idx, category_name: name }));
            categoriesData[currentTab] = catList;
            streamsCache[currentTab] = parsed;
            renderCategories(catList);
            return;
        }
        
        let endpoint = '';
        if(currentTab === 'live') endpoint = apiUrl('get_live_categories');
        else if(currentTab === 'movies') endpoint = apiUrl('get_vod_categories');
        else if(currentTab === 'series') endpoint = apiUrl('get_series_categories');
        else if(currentTab === 'sports' || currentTab === 'kids') endpoint = apiUrl('get_live_categories');
        if(!endpoint) return;
        const data = await fetchAPI(endpoint);
        if(!data || !Array.isArray(data)) { container.innerHTML = '<div class="error-box">Sin conexión o error categorías</div>'; return; }
        categoriesData[currentTab] = data;
        renderCategories(data);
    }
    
    function renderCategories(cats) {
        let html = '';
        for(const cat of cats) {
            let catName = cat.category_name;
            if(currentTab === 'sports' && !catName.toLowerCase().includes('sport')) continue;
            if(currentTab === 'kids' && !catName.toLowerCase().includes('kid') && !catName.toLowerCase().includes('niño') && !catName.toLowerCase().includes('infantil')) continue;
            html += `<div class="category-modern" data-cat-id="${cat.category_id}">
                <div class="category-modern-header" onclick="toggleModernCategory(this)">
                    <span>📁 ${escapeHtml(cat.category_name)}</span>
                    <span>▼</span>
                </div>
                <div class="category-modern-content"><div class="loading-spinner"><div class="spinner"></div></div></div>
            </div>`;
        }
        document.getElementById('categoriesContainer').innerHTML = html || '<div class="error-box">No hay categorías disponibles</div>';
        if(searchTerm) filterChannels();
    }
    
    window.toggleModernCategory = function(header) {
        const parent = header.parentElement;
        const content = parent.querySelector('.category-modern-content');
        const isOpen = content.classList.contains('open');
        content.classList.toggle('open');
        if(!isOpen && content.querySelector('.loading-spinner')) {
            const catId = parent.getAttribute('data-cat-id');
            loadCategoryContent(catId, content);
        }
    };
    
    async function loadCategoryContent(categoryId, contentDiv) {
        if(currentServer.type === 'm3u') {
            const categoryName = categoriesData[currentTab].find(c => c.category_id == categoryId)?.category_name;
            const channels = streamsCache[currentTab][categoryName];
            if(channels) renderChannelsModern(channels, contentDiv);
            return;
        }
        let endpoint = '';
        if(currentTab === 'live') endpoint = apiUrl('get_live_streams', `&category_id=${categoryId}`);
        else if(currentTab === 'movies') endpoint = apiUrl('get_vod_streams', `&category_id=${categoryId}`);
        else if(currentTab === 'series') endpoint = apiUrl('get_series', `&category_id=${categoryId}`);
        else if(currentTab === 'sports') endpoint = apiUrl('get_live_streams', `&category_id=${categoryId}`);
        else if(currentTab === 'kids') endpoint = apiUrl('get_live_streams', `&category_id=${categoryId}`);
        if(!endpoint) return;
        const data = await fetchAPI(endpoint);
        if(!data || !Array.isArray(data)) { contentDiv.innerHTML = '<p style="padding:20px;">Sin contenido</p>'; return; }
        if(currentTab === 'series') {
            streamsCache[currentTab] = streamsCache[currentTab] || {};
            streamsCache[currentTab][categoryId] = data;
        }
        renderChannelsModern(data, contentDiv);
    }
    
    function renderChannelsModern(items, container) {
        let html = '<div>';
        for(const item of items) {
            const name = escapeHtml(item.name || item.title || 'Sin nombre');
            let url = '', isM3u8 = false;
            let streamId = item.stream_id || item.series_id;
            if(currentServer.type === 'm3u') { url = item.url; isM3u8 = url.includes('.m3u8'); }
            else if(currentTab === 'live' || currentTab === 'sports' || currentTab === 'kids') {
                url = `${currentServer.url}/live/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.m3u8`;
                isM3u8 = true;
            }
            else if(currentTab === 'movies') {
                const ext = item.container_extension || 'mp4';
                url = `${currentServer.url}/movie/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.${ext}`;
            }
            else if(currentTab === 'series') {
                html += `<div class="channel-item" onclick='showSeriesEpisodesModern(${item.series_id}, "${name.replace(/'/g, "\\'")}")'>
                    <div class="channel-icon-small">📺</div>
                    <span>${name}</span>
                    <span style="margin-left:auto; font-size:11px;">🎬 Ver temp.</span>
                </div>`;
                continue;
            }
            html += `<div class="channel-item" data-url="${url.replace(/'/g, "\\'")}" data-name="${name.replace(/'/g, "\\'")}" data-ism3u8="${isM3u8}" onclick='playStreamModern(this.getAttribute("data-url"), this.getAttribute("data-name"), this.getAttribute("data-ism3u8") === "true")'>
                <div class="channel-icon-small">${currentTab === 'movies' ? '🎬' : '📡'}</div>
                <span>${name}</span>
            </div>`;
        }
        html += '</div>';
        container.innerHTML = html;
        if(searchTerm) filterChannels();
    }
    
    window.showSeriesEpisodesModern = async function(seriesId, seriesName) {
        if(parentalLock && !checkParentalUnlock()) return;
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Cargando episodios...</p></div>';
        const endpoint = apiUrl('get_series_info', `&series_id=${seriesId}`);
        const data = await fetchAPI(endpoint);
        if(!data || !data.episodes) {
            container.innerHTML = `<div class="error-box">Error episodios<br><button onclick="loadCategories()" style="margin-top:12px;">Volver</button></div>`;
            return;
        }
        let html = `<div><button onclick="loadCategories()" style="margin:12px; background:#444;">◀ Volver a series</button><h3 style="padding:12px;">📺 ${escapeHtml(seriesName)}</h3>`;
        const episodes = data.episodes;
        const seasons = Object.keys(episodes).sort((a,b)=>parseInt(a)-parseInt(b));
        for(const seasonNum of seasons) {
            const epList = episodes[seasonNum];
            html += `<div class="category-modern" style="margin-bottom:10px;"><div class="category-modern-header" onclick="toggleModernCategory(this)"><span>🎬 Temporada ${seasonNum} (${epList.length})</span><span>▼</span></div><div class="category-modern-content">`;
            for(const ep of epList) {
                const epName = escapeHtml(ep.title || `Episodio ${ep.episode_num}`);
                const ext = ep.container_extension || 'mp4';
                const videoUrl = `${currentServer.url}/series/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${ep.id}.${ext}`;
                html += `<div class="channel-item" onclick='playStreamModern("${videoUrl.replace(/'/g, "\\'")}", "${escapeHtml(seriesName)} - ${epName.replace(/'/g, "\\'")}", false)'>
                    <div class="channel-icon-small">🎞️</div><span>${epName}</span>
                </div>`;
            }
            html += `</div></div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
    };
    
    window.playStreamModern = function(url, title, isM3u8) {
        if(parentalLock && !checkParentalUnlock()) return;
        const video = document.getElementById('video');
        const titleDiv = document.getElementById('currentTitle');
        if(hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();
        titleDiv.innerHTML = `Cargando: ${title}...`;
        video.muted = false;
        // Mejora de audio: volumen por defecto alto
        video.volume = 0.8;
        if(isM3u8 && Hls.isSupported()) {
            const hls = new Hls({ enableWorker: true, debug: false, maxBufferLength: 30, liveSyncDurationCount: 3 });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(e=>titleDiv.innerHTML=`🔊 ${title}`); titleDiv.innerHTML = `▶️ ${title}`; });
            hls.on(Hls.Events.ERROR, (e,d) => { if(d.fatal) titleDiv.innerHTML = `❌ Error en ${title}`; });
            hlsPlayer = hls;
        } else {
            video.src = url;
            video.play().catch(e=>titleDiv.innerHTML=`🔊 ${title} (toca play)`);
            titleDiv.innerHTML = `▶️ ${title}`;
        }
    };
    
    function filterChannels() {
        const term = searchTerm.toLowerCase();
        document.querySelectorAll('.channel-item').forEach(item => {
            const name = item.querySelector('span')?.innerText || '';
            item.style.display = name.toLowerCase().includes(term) ? 'flex' : 'none';
        });
    }
    
    document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value; filterChannels(); });
    
    async function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.top-cat').forEach(t => t.classList.remove('active'));
        document.querySelector(`.top-cat[data-tab="${tab}"]`).classList.add('active');
        searchTerm = '';
        document.getElementById('searchInput').value = '';
        currentSeriesContext = null;
        await loadCategories();
    }
    document.querySelectorAll('.top-cat').forEach(cat => cat.addEventListener('click', () => switchTab(cat.getAttribute('data-tab'))));
    
    function showServerManager() {
        let modal = document.createElement('div'); modal.className = 'modal';
        let html = `<div class="modal-card"><h3>📡 MIS SERVIDORES</h3><button id="qrShareBtn" style="margin-bottom:15px;">📱 QR Compartir</button>`;
        for(let s of servers) {
            html += `<div class="server-row"><div><strong>${escapeHtml(s.name)}</strong><br><small>Expira: ${serverExpiryDates[s.id] ? new Date(serverExpiryDates[s.id]).toLocaleDateString() : '∞'}</small></div><div>${s.id === currentServer.id ? '✅' : `<button onclick="window.activateSrv(${s.id})">Activar</button>`} <button onclick="window.delSrv(${s.id})" style="background:#dc2626;">🗑</button></div></div>`;
        }
        html += `<button onclick="window.showAddModal()">➕ Agregar lista</button><button onclick="closeModal()" style="background:#444;">Cerrar</button></div>`;
        modal.innerHTML = html; document.body.appendChild(modal);
        window.activateSrv = (id) => { setActiveServer(id); modal.remove(); };
        window.delSrv = (id) => { deleteServer(id); modal.remove(); setTimeout(showServerManager,100); };
        window.showAddModal = () => { modal.remove(); showAddServerModal(); };
        document.getElementById('qrShareBtn').onclick = () => { showQRInstallModal(); modal.remove(); };
        window.closeModal = () => modal.remove();
    }
    
    function showAddServerModal() {
        let modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card">
            <h3>➕ AGREGAR LISTA</h3>
            <input id="newName" placeholder="Nombre de la lista">
            <div style="display:flex;gap:8px;margin:10px 0;">
                <button id="modeUrlBtn" onclick="switchAddMode('url')" style="flex:1;background:#e50914;font-size:13px;">🔗 URL Completa</button>
                <button id="modeCredsBtn" onclick="switchAddMode('creds')" style="flex:1;background:#444;font-size:13px;">🔐 Host + Credenciales</button>
            </div>
            <div id="modeUrlSection">
                <input id="newUrl" placeholder="http://servidor:puerto/get.php?username=X&password=Y  o  URL M3U directa">
            </div>
            <div id="modeCredsSection" style="display:none;">
                <input id="newHost" placeholder="http://servidor:puerto">
                <input id="newUser" placeholder="Usuario">
                <input id="newPass" placeholder="Contraseña" type="password">
            </div>
            <button id="saveAddBtn">✅ Guardar</button>
            <button onclick="this.closest('.modal').remove()" style="background:#444;">Cancelar</button>
        </div>`;
        document.body.appendChild(modal);
        window.switchAddMode = (mode) => {
            document.getElementById('modeUrlSection').style.display = mode === 'url' ? '' : 'none';
            document.getElementById('modeCredsSection').style.display = mode === 'creds' ? '' : 'none';
            document.getElementById('modeUrlBtn').style.background = mode === 'url' ? '#e50914' : '#444';
            document.getElementById('modeCredsBtn').style.background = mode === 'creds' ? '#e50914' : '#444';
        };
        document.getElementById('saveAddBtn').onclick = () => {
            const name = document.getElementById('newName').value.trim();
            if(!name) { alert("El nombre es requerido"); return; }
            const modeIsUrl = document.getElementById('modeUrlSection').style.display !== 'none';
            let newId = Date.now(), newServer = null;
            if(modeIsUrl) {
                const url = document.getElementById('newUrl').value.trim();
                if(!url) { alert("La URL es requerida"); return; }
                const hasUser = url.includes('username=');
                const hasPass = url.includes('password=');
                if(hasUser && hasPass) {
                    const hostMatch = url.match(/^(https?:\/\/[^/]+)/i);
                    const userMatch = url.match(/[?&]username=([^&]+)/i);
                    const passMatch = url.match(/[?&]password=([^&]+)/i);
                    if(hostMatch && userMatch && passMatch) {
                        newServer = { id: newId, name, url: hostMatch[1], user: decodeURIComponent(userMatch[1]), pass: decodeURIComponent(passMatch[1]), type: "xtream", active: false };
                    } else { alert("No se pudo parsear."); return; }
                } else { newServer = { id: newId, name, m3uUrl: url, type: "m3u", active: false }; }
            } else {
                const host = document.getElementById('newHost').value.trim();
                const user = document.getElementById('newUser').value.trim();
                const pass = document.getElementById('newPass').value.trim();
                if(!host || !user || !pass) { alert("Complete campos"); return; }
                newServer = { id: newId, name, url: host.replace(/\/+$/,''), user, pass, type: "xtream", active: false };
            }
            servers.push(newServer);
            let expiry = new Date(); expiry.setFullYear(expiry.getFullYear()+1);
            serverExpiryDates[newId] = expiry.toISOString();
            saveFullData();
            setActiveServer(newId);
            modal.remove();
        };
    }
    
    function showQRInstallModal() {
        let shareUrl = currentServer.type === 'xtream' ? `${currentServer.url}/get.php?username=${currentServer.user}&password=${currentServer.pass}&type=m3u_plus` : currentServer.m3uUrl;
        let modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card"><h3>📱 COMPARTIR</h3><div id="qrCodeContainer" style="text-align:center; background:white; padding:20px; border-radius:20px;"></div><p style="margin-top:12px; word-break:break-all;">${escapeHtml(shareUrl)}</p><button onclick="navigator.clipboard.writeText('${shareUrl.replace(/'/g, "\\'")}')">Copiar enlace</button><button onclick="this.closest('.modal').remove()" style="background:#444;">Cerrar</button></div>`;
        document.body.appendChild(modal);
        new QRCode(document.getElementById("qrCodeContainer"), { text: shareUrl, width: 180, height: 180 });
    }
    
    function checkParentalUnlock() {
        if(parentalLock) {
            let pwd = prompt("🔒 Control Parental activado. Contraseña:");
            if(pwd === parentalPassword) { parentalLock = false; saveFullData(); return true; }
            else { alert("Contraseña incorrecta"); return false; }
        }
        return true;
    }
    function showParentalSettings() {
        let modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-card"><h3>🔐 CONTROL PARENTAL</h3><input type="password" id="newPassInput" placeholder="Nueva contraseña (4+)" maxlength="6"><button id="toggleLockBtn">${parentalLock ? 'Desbloquear ahora' : 'Bloquear'}</button><button id="closeParental">Cerrar</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('toggleLockBtn').onclick = () => {
            let newPass = document.getElementById('newPassInput').value;
            if(!parentalLock && newPass.length>=4) parentalPassword = newPass;
            parentalLock = !parentalLock;
            saveFullData();
            modal.remove();
            showParentalSettings();
        };
        document.getElementById('closeParental').onclick = () => modal.remove();
    }
    
    function updateClock() { document.getElementById('clock').innerHTML = new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
    updateClock(); setInterval(updateClock, 1000);
    
    document.getElementById('addBtn').onclick = () => showAddServerModal();
    document.getElementById('serverBtn').onclick = () => showServerManager();
    document.getElementById('parentalBtn').onclick = () => showParentalSettings();
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    loadServers();
</script>
