<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel Remoto LUIS R</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial; text-align: center; padding: 20px; }
        input, button { padding: 12px; margin: 8px auto; border-radius: 30px; border: none; width: 90%; max-width: 400px; display: block; }
        input { background: #1e1e2a; color: white; }
        button { background: #ffd700; color: #000; font-weight: bold; cursor: pointer; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>
    <h2>🔐 Panel Remoto LUIS R</h2>
    <input type="text" id="codigo" placeholder="🔑 Código de acceso (ej: LUIS2024)">
    <input type="text" id="nombre" placeholder="📛 Nombre de la lista">
    <input type="text" id="url" placeholder="🔗 URL de la lista M3U o Xtream">
    <input type="text" id="usuario" placeholder="👤 Usuario (opcional)">
    <input type="password" id="pass" placeholder="🔑 Contraseña (opcional)">
    <button onclick="enviarLista()">📡 ENVIAR LISTA</button>
    <div id="estado"></div>

    <script>
        function enviarLista() {
            const codigo = document.getElementById('codigo').value.trim();
            const nombre = document.getElementById('nombre').value.trim();
            const url = document.getElementById('url').value.trim();
            const usuario = document.getElementById('usuario').value.trim();
            const pass = document.getElementById('pass').value.trim();

            if (!codigo || !nombre || !url) {
                document.getElementById('estado').innerHTML = '<div class="error">❌ Completa código, nombre y URL</div>';
                return;
            }

            const listas = JSON.parse(localStorage.getItem(`listas_${codigo}`) || '[]');
            const nuevaLista = { nombre, url, usuario, pass, fecha: new Date().toISOString() };
            listas.push(nuevaLista);
            localStorage.setItem(`listas_${codigo}`, JSON.stringify(listas));

            document.getElementById('estado').innerHTML = '<div class="success">✅ Lista enviada correctamente</div>';
            document.getElementById('nombre').value = '';
            document.getElementById('url').value = '';
            document.getElementById('usuario').value = '';
            document.getElementById('pass').value = '';
        }
    </script>
</body>
</html>
