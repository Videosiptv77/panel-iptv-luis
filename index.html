<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🦉 LUIS R IPTV · FULL FUNCIONAL</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a14;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: rgba(10,10,20,0.97);
            padding: 14px 16px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-text { font-size: 22px; font-weight: 900; color: #ff6b1a; }
        .logo-emoji { font-size: 22px; }
        .header-right { display: flex; align-items: center; gap: 14px; }
        .icon-btn-header { background: none; border: none; font-size: 22px; cursor: pointer; color: #ccc; padding: 4px; }
        .expiry-small { font-size: 11px; color: #facc15; background: rgba(250,204,21,0.1); border-radius: 20px; padding: 2px 8px; }

        /* Search */
        .search-bar-wrap { padding: 14px 16px 10px; background: #0a0a14; display: flex; align-items: center; gap: 12px; }
        .search-input { flex: 1; background: #1a1a2e; border: none; border-radius: 40px; padding: 12px 20px; color: #ccc; font-size: 15px; outline: none; }

        /* Tabs */
        .nav-tabs {
            display: flex; gap: 0; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
            overflow-x: auto; white-space: nowrap; background: #0a0a14;
        }
        .nav-tab { padding: 12px 14px; font-size: 14px; font-weight: 700; color: #888; cursor: pointer; border-bottom: 3px solid transparent; }
        .nav-tab.active { color: #ff6b1a; border-bottom-color: #ff6b1a; }

        /* Hero banner */
        .hero-banner {
            margin: 16px; border-radius: 16px; overflow: hidden; position: relative;
            background: #141414; min-height: 180px; display: flex; align-items: flex-end;
        }
        .hero-bg { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%), #1a0a0a; display: flex; align-items: center; justify-content: center; }
        .hero-netflix-logo { font-size: 48px; font-weight: 900; color: #e50914; font-family: 'Arial Black', sans-serif; text-shadow: 0 0 40px rgba(229,9,20,0.4); }
        .hero-content { position: relative; padding: 18px; width: 100%; }
        .hero-title { font-size: 18px; font-weight: 900; }
        .hero-sub { font-size: 12px; color: #bbb; }
        .hero-fab { position: absolute; bottom: 16px; right: 16px; width: 46px; height: 46px; background: #ff6b1a; border-radius: 50%; border: none; font-size: 24px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Section */
        .section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 10px; }
        .section-title { font-size: 17px; font-weight: 800; }
        .section-add-link { color: #ff6b1a; font-size: 14px; font-weight: 600; cursor: pointer; background: none; border: none; }

        .channel-list-section { padding: 0 0 100px; }
        .empty-state { text-align: center; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .empty-tv { font-size: 64px; }

        /* Category and channel items */
        .category-block { margin: 0 12px 10px; background: #111120; border-radius: 16px; overflow: hidden; }
        .cat-header { padding: 14px 16px; background: #161625; cursor: pointer; font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; color: #ddd; }
        .cat-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease-out; }
        .cat-body.open { max-height: 500px; overflow-y: auto; }
        .ch-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; color: #ccc; }
        .ch-item:hover { background: #1e1e30; color: #fff; }
        .ch-item.playing { background: rgba(255,107,26,0.12); color: #ff6b1a; }
        .ch-icon { width: 34px; height: 34px; background: #1e1e2e; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

        /* Mini player */
        .mini-player {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,10,20,0.98); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08); padding: 10px 16px 16px;
            z-index: 500; display: none;
        }
        .mini-player.visible { display: block; }
        .mini-player-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .mini-thumb { width: 52px; height: 36px; background: #000; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .mini-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .mini-info { flex: 1; }
        .mini-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-status { font-size: 11px; color: #ff6b1a; }
        .mini-controls { display: flex; gap: 8px; }
        .mini-btn { background: #1e1e2e; border: none; color: #fff; font-size: 16px; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mini-btn.expand { background: #ff6b1a; font-size: 18px; }
        .mini-progress { height: 3px; background: #333; border-radius: 4px; overflow: hidden; }
        .mini-progress-fill { height: 100%; background: #ff6b1a; width: 0%; }

        /* Bottom nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,10,20,0.98); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex; z-index: 400;
        }
        .nav-btn { flex: 1; padding: 12px 0 8px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; color: #666; font-size: 10px; font-weight: 600; }
        .nav-btn.active { color: #ff6b1a; }
        .nav-btn-icon { font-size: 22px; }

        .global-fab { position: fixed; right: 20px; bottom: 80px; width: 54px; height: 54px; background: #ff6b1a; border-radius: 50%; border: none; font-size: 26px; color: #fff; cursor: pointer; z-index: 600; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 24px rgba(255,107,26,0.55); }

        /* Modal (agregar y gestionar) */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .modal-card {
            background: #121220; border-radius: 28px; width: 92%; max-width: 500px; max-height: 88vh;
            overflow-y: auto; padding: 26px; border: 1px solid rgba(255,107,26,0.3);
        }
        .modal-card h3 { font-size: 20px; margin-bottom: 18px; color: #ff6b1a; font-weight: 800; }
        .modal-card input, .modal-card select, .modal-card textarea {
            width: 100%; padding: 12px 16px; margin-bottom: 12px; background: #1e1e2e;
            border: 1px solid #333; border-radius: 16px; color: white; font-size: 14px; outline: none;
        }
        .server-row {
            background: #1a1a2a; margin: 8px 0; padding: 14px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
        }
        button { background: #ff6b1a; border: none; padding: 10px 20px; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; font-size: 13px; }
        .btn-secondary { background: #333; }
        .btn-danger { background: #dc2626; }

        .mode-btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .mode-btn-row button { flex: 1; font-size: 12px; }

        .loading-state { text-align: center; padding: 30px 20px; }
        .spinner { width: 36px; height: 36px; border: 3px solid #222; border-top-color: #ff6b1a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { background: rgba(239,68,68,0.1); padding: 18px; border-radius: 16px; color: #f87171; text-align: center; margin: 12px; }

        /* Fullscreen overlay (simplificado pero funcional) */
        .fullscreen-overlay {
            position: fixed; inset: 0; z-index: 2000; background: #000; display: none; flex-direction: column;
        }
        .fullscreen-overlay.active { display: flex; }
        .fs-video-wrap { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        #fsVideo { width: 100%; height: 100%; object-fit: contain; }
        .fs-controls-bar {
            position: absolute; bottom: 20px; left: 0; right: 0; background: rgba(0,0,0,0.6); padding: 12px;
            display: flex; justify-content: center; gap: 20px; backdrop-filter: blur(10px);
        }
        .fs-btn { background: #ff6b1a; border: none; color: white; padding: 8px 20px; border-radius: 30px; font-size: 14px; cursor: pointer; }
        .fs-close { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); border: none; color: white; font-size: 24px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ff6b1a; }
    </style>
</head>

<script>
// ===================== CONFIGURACIÓN Y SERVIDORES =====================
let servers = [];
let currentServer = null;
let currentTab = 'live';
let categoriesData = {};
let streamsCache = {};
let allChannels = [];      // lista plana de canales (para reproducción)
let currentChannelIndex = -1;
let hlsPlayer = null;
let fullscreenHls = null;
let searchTerm = '';
let serverExpiryDates = {};

// Servidores de ejemplo (activo el primero)
const defaultServers = [
    { id: 1, name: "MSTR TV", url: "http://mstrtv.com:25461", user: "Joseangeljaur", pass: "c91dea7b374135eb7eac31a468326e75", type: "xtream", active: true },
    { id: 2, name: "BSTV", url: "http://bstv.online:8080", user: "7876151421", pass: "7876151421", type: "xtream", active: false },
    { id: 3, name: "PLAY TV", url: "http://playtv44.com:8080", user: "MASTER", pass: "23423", type: "xtream", active: false },
    { id: 4, name: "TV LITE", url: "http://tvlite.xyz:8080", user: "claudiocalderon62725", pass: "M3zVt2nfwb", type: "xtream", active: false }
];

function loadData() {
    try {
        const saved = localStorage.getItem('luisr_iptv_full');
        if(saved) {
            const data = JSON.parse(saved);
            servers = data.servers || [];
            serverExpiryDates = data.expiryDates || {};
        }
    } catch(e) {}
    if(!servers.length) {
        servers = JSON.parse(JSON.stringify(defaultServers));
        const now = new Date();
        servers.forEach(s => {
            const ex = new Date(now);
            ex.setFullYear(ex.getFullYear() + 1);
            serverExpiryDates[s.id] = ex.toISOString();
        });
        saveData();
    }
    currentServer = servers.find(s => s.active) || servers[0];
    updateBadge();
    loadCategories();
}
function saveData() {
    localStorage.setItem('luisr_iptv_full', JSON.stringify({ servers, expiryDates: serverExpiryDates }));
}
function updateBadge() {
    if(currentServer && serverExpiryDates[currentServer.id]) {
        const exp = new Date(serverExpiryDates[currentServer.id]).toLocaleDateString();
        document.getElementById('expiryBadge').textContent = `📅 ${exp}`;
    } else {
        document.getElementById('expiryBadge').textContent = '📅 ∞';
    }
}
function setActiveServer(id) {
    servers = servers.map(s => ({ ...s, active: s.id === id }));
    currentServer = servers.find(s => s.id === id);
    saveData();
    updateBadge();
    loadCategories();
}
function deleteServer(id) {
    if(servers.length <= 1) { alert("Debe quedar al menos un servidor"); return; }
    servers = servers.filter(s => s.id !== id);
    if(currentServer.id === id) setActiveServer(servers[0].id);
    else saveData();
    updateBadge();
}

// API helpers
function apiUrl(action, params='') {
    if(!currentServer || currentServer.type !== 'xtream') return '';
    return `${currentServer.url}/player_api.php?username=${currentServer.user}&password=${currentServer.pass}&action=${action}${params}`;
}
async function fetchAPI(url) {
    try {
        const res = await fetch(url, { cache: 'no-store' });
        if(!res.ok) return null;
        return await res.json();
    } catch(e) { return null; }
}
async function parseM3U(m3uUrl) {
    try {
        const res = await fetch(m3uUrl);
        if(!res.ok) return null;
        const text = await res.text();
        const lines = text.split('\n');
        const categories = {};
        for(let i=0; i<lines.length; i++) {
            const line = lines[i].trim();
            if(!line.startsWith('#EXTINF:')) continue;
            const nameMatch = line.match(/#EXTINF:.*?,(.*)$/);
            const name = nameMatch ? nameMatch[1] : 'Sin nombre';
            const groupMatch = line.match(/group-title="([^"]*)"/);
            const category = groupMatch ? groupMatch[1] : 'General';
            let urlLine = '';
            for(let j=i+1; j<lines.length; j++) {
                if(lines[j].trim() && !lines[j].trim().startsWith('#')) {
                    urlLine = lines[j].trim();
                    break;
                }
            }
            if(urlLine && name !== 'Sin nombre') {
                if(!categories[category]) categories[category] = [];
                categories[category].push({ name, url: urlLine });
            }
        }
        return categories;
    } catch(e) { return null; }
}

// Categorías y canales
async function loadCategories() {
    const container = document.getElementById('categoriesContainer');
    const empty = document.getElementById('emptyState');
    container.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Cargando...</p></div>';
    empty.style.display = 'none';
    if(!currentServer) { empty.style.display = 'flex'; container.innerHTML = ''; return; }

    if(currentServer.type === 'm3u') {
        const parsed = await parseM3U(currentServer.m3uUrl);
        if(!parsed) { container.innerHTML = '<div class="error-box">Error al cargar M3U</div>'; return; }
        const catList = Object.keys(parsed).map((name, idx) => ({ category_id: idx, category_name: name }));
        categoriesData[currentTab] = catList;
        streamsCache[currentTab] = parsed;
        renderCategories(catList);
        return;
    }

    let endpoint = '';
    if(currentTab === 'live') endpoint = apiUrl('get_live_categories');
    else if(currentTab === 'movies') endpoint = apiUrl('get_vod_categories');
    else if(currentTab === 'series') endpoint = apiUrl('get_series_categories');
    if(!endpoint) { container.innerHTML = '<div class="error-box">No se pudo conectar</div>'; return; }
    const data = await fetchAPI(endpoint);
    if(!data || !Array.isArray(data)) { container.innerHTML = '<div class="error-box">Error del servidor</div>'; return; }
    categoriesData[currentTab] = data;
    renderCategories(data);
}

function renderCategories(cats) {
    if(!cats.length) { document.getElementById('categoriesContainer').innerHTML = '<div class="error-box">Sin categorías</div>'; return; }
    let html = '';
    for(const cat of cats) {
        html += `<div class="category-block" data-cat-id="${cat.category_id}">
            <div class="cat-header" onclick="toggleCat(this)">
                <span>📁 ${escapeHtml(cat.category_name)}</span><span>▼</span>
            </div>
            <div class="cat-body"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>`;
    }
    document.getElementById('categoriesContainer').innerHTML = html;
    if(searchTerm) filterChannels();
}

window.toggleCat = function(header) {
    const block = header.parentElement;
    const body = block.querySelector('.cat-body');
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open');
    if(!isOpen && body.querySelector('.spinner')) {
        const catId = block.getAttribute('data-cat-id');
        loadCatContent(catId, body);
    }
};

async function loadCatContent(categoryId, bodyDiv) {
    if(currentServer.type === 'm3u') {
        const catName = categoriesData[currentTab]?.find(c => c.category_id == categoryId)?.category_name;
        const channels = streamsCache[currentTab]?.[catName];
        if(channels) renderChannels(channels, bodyDiv);
        return;
    }
    let endpoint = '';
    if(currentTab === 'live') endpoint = apiUrl('get_live_streams', `&category_id=${categoryId}`);
    else if(currentTab === 'movies') endpoint = apiUrl('get_vod_streams', `&category_id=${categoryId}`);
    else if(currentTab === 'series') endpoint = apiUrl('get_series', `&category_id=${categoryId}`);
    if(!endpoint) return;
    const data = await fetchAPI(endpoint);
    if(!data || !Array.isArray(data)) { bodyDiv.innerHTML = '<p style="padding:16px;">Sin contenido</p>'; return; }
    renderChannels(data, bodyDiv);
}

function renderChannels(items, container) {
    let html = '';
    for(const item of items) {
        const name = escapeHtml(item.name || item.title || 'Sin nombre');
        let url = '', isM3u8 = false;
        if(currentServer.type === 'm3u') {
            url = item.url;
            isM3u8 = url.includes('.m3u8');
        } else if(currentTab === 'live') {
            url = `${currentServer.url}/live/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.m3u8`;
            isM3u8 = true;
        } else if(currentTab === 'movies') {
            const ext = item.container_extension || 'mp4';
            url = `${currentServer.url}/movie/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${item.stream_id}.${ext}`;
        } else if(currentTab === 'series') {
            html += `<div class="ch-item" onclick='showSeries(${item.series_id},"${name.replace(/'/g,"\\'")}")'><div class="ch-icon">📺</div><span>${name}</span><span style="margin-left:auto;">›</span></div>`;
            continue;
        }
        const idx = allChannels.length;
        allChannels.push({ url, name, isM3u8 });
        html += `<div class="ch-item" data-idx="${idx}" onclick='playChannel(${idx})'><div class="ch-icon">${currentTab==='movies'?'🎬':'📡'}</div><span>${name}</span></div>`;
    }
    container.innerHTML = html || '<p style="padding:16px;">Sin contenido</p>';
    if(searchTerm) filterChannels();
}

window.showSeries = async function(seriesId, seriesName) {
    const container = document.getElementById('categoriesContainer');
    container.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Cargando episodios...</p></div>';
    const data = await fetchAPI(apiUrl('get_series_info', `&series_id=${seriesId}`));
    if(!data || !data.episodes) { container.innerHTML = `<div class="error-box">Error<br><button onclick="loadCategories()">Volver</button></div>`; return; }
    let html = `<div style="padding:12px;"><button onclick="loadCategories()" style="background:#333;">◀ Volver</button><h3 style="margin:12px 0;">📺 ${escapeHtml(seriesName)}</h3>`;
    const seasons = Object.keys(data.episodes).sort((a,b)=>parseInt(a)-parseInt(b));
    for(const sn of seasons) {
        const eps = data.episodes[sn];
        html += `<div class="category-block" style="margin-bottom:12px;"><div class="cat-header" onclick="this.nextElementSibling.classList.toggle('open')"><span>🎬 Temporada ${sn} (${eps.length})</span><span>▼</span></div><div class="cat-body">`;
        for(const ep of eps) {
            const epName = escapeHtml(ep.title || `Episodio ${ep.episode_num}`);
            const ext = ep.container_extension || 'mp4';
            const videoUrl = `${currentServer.url}/series/${encodeURIComponent(currentServer.user)}/${encodeURIComponent(currentServer.pass)}/${ep.id}.${ext}`;
            const idx = allChannels.length;
            allChannels.push({ url: videoUrl, name: `${seriesName} - ${epName}`, isM3u8: false });
            html += `<div class="ch-item" onclick='playChannel(${idx})'><div class="ch-icon">🎞️</div><span>${epName}</span></div>`;
        }
        html += `</div></div>`;
    }
    html += `</div>`;
    container.innerHTML = html;
};

// ===================== REPRODUCCIÓN =====================
const miniVideo = document.getElementById('miniVideo');
window.playChannel = function(idx) {
    currentChannelIndex = idx;
    const ch = allChannels[idx];
    if(!ch) return;
    playStream(ch.url, ch.name, ch.isM3u8, false);
    document.querySelectorAll('.ch-item.playing').forEach(el => el.classList.remove('playing'));
    const el = document.querySelector(`.ch-item[data-idx="${idx}"]`);
    if(el) el.classList.add('playing');
};

function playStream(url, title, isM3u8, isFullscreen) {
    const videoElem = isFullscreen ? document.getElementById('fsVideo') : miniVideo;
    if(!isFullscreen && hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
    if(isFullscreen && fullscreenHls) { fullscreenHls.destroy(); fullscreenHls = null; }
    videoElem.pause();
    videoElem.removeAttribute('src');
    videoElem.load();
    videoElem.muted = false;

    if(!isFullscreen) {
        document.getElementById('miniTitle').textContent = title;
        document.getElementById('miniStatus').textContent = '▶ Reproduciendo';
        document.getElementById('miniPlayer').classList.add('visible');
    }

    if(isM3u8 && Hls.isSupported()) {
        const hls = new Hls({ enableWorker: true, debug: false });
        hls.loadSource(url);
        hls.attachMedia(videoElem);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { videoElem.play().catch(e=>console.log(e)); });
        if(isFullscreen) fullscreenHls = hls;
        else hlsPlayer = hls;
    } else {
        videoElem.src = url;
        videoElem.play().catch(e=>console.log(e));
    }
}

// Controles mini
document.getElementById('miniPlayBtn').onclick = () => {
    if(miniVideo.paused) { miniVideo.play(); document.getElementById('miniPlayBtn').textContent = '⏸'; }
    else { miniVideo.pause(); document.getElementById('miniPlayBtn').textContent = '▶'; }
};
miniVideo.addEventListener('timeupdate', () => {
    if(miniVideo.duration) {
        const pct = (miniVideo.currentTime / miniVideo.duration) * 100;
        document.getElementById('miniProgressFill').style.width = pct + '%';
    }
});

// Fullscreen overlay
const fsOverlay = document.getElementById('fullscreenOverlay');
const fsVideo = document.getElementById('fsVideo');
document.getElementById('miniExpandBtn').onclick = () => {
    if(currentChannelIndex >= 0 && allChannels[currentChannelIndex]) {
        fsOverlay.classList.add('active');
        const ch = allChannels[currentChannelIndex];
        playStream(ch.url, ch.name, ch.isM3u8, true);
    } else {
        alert("Selecciona un canal primero");
    }
};
document.getElementById('fsCloseBtn').onclick = () => {
    fsOverlay.classList.remove('active');
    if(fullscreenHls) { fullscreenHls.destroy(); fullscreenHls = null; }
    fsVideo.pause();
};
document.getElementById('fsCloseFull').onclick = () => document.getElementById('fsCloseBtn').click();
document.getElementById('fsPlayPause').onclick = () => {
    if(fsVideo.paused) fsVideo.play();
    else fsVideo.pause();
};

// ===================== MODALES PARA AGREGAR SERVIDORES =====================
function showAddServerModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
        <div class="modal-card">
            <h3>➕ Agregar servidor / lista</h3>
            <input id="newName" placeholder="Nombre (ej: Mi servidor)">
            <div class="mode-btn-row">
                <button id="modeXtreamBtn" style="background:#ff6b1a;">🔐 Xtream Codes</button>
                <button id="modeM3uBtn" class="btn-secondary">🔗 Lista M3U</button>
            </div>
            <div id="xtreamFields">
                <input id="xtreamUrl" placeholder="URL del servidor (http://ejemplo:8080)">
                <input id="xtreamUser" placeholder="Usuario">
                <input id="xtreamPass" type="password" placeholder="Contraseña">
            </div>
            <div id="m3uFields" style="display:none;">
                <input id="m3uUrl" placeholder="URL completa de la lista M3U">
            </div>
            <button id="saveServerBtn">✅ Guardar</button>
            <button class="btn-secondary" onclick="this.closest('.modal').remove()">Cancelar</button>
        </div>
    `;
    document.body.appendChild(modal);

    document.getElementById('modeXtreamBtn').onclick = () => {
        document.getElementById('xtreamFields').style.display = 'block';
        document.getElementById('m3uFields').style.display = 'none';
        document.getElementById('modeXtreamBtn').style.background = '#ff6b1a';
        document.getElementById('modeM3uBtn').style.background = '#333';
    };
    document.getElementById('modeM3uBtn').onclick = () => {
        document.getElementById('xtreamFields').style.display = 'none';
        document.getElementById('m3uFields').style.display = 'block';
        document.getElementById('modeM3uBtn').style.background = '#ff6b1a';
        document.getElementById('modeXtreamBtn').style.background = '#333';
    };

    document.getElementById('saveServerBtn').onclick = () => {
        const name = document.getElementById('newName').value.trim();
        if(!name) { alert("Ingresa un nombre"); return; }
        const isXtream = document.getElementById('xtreamFields').style.display !== 'none';
        const newId = Date.now();
        let newServer;
        if(isXtream) {
            const url = document.getElementById('xtreamUrl').value.trim();
            const user = document.getElementById('xtreamUser').value.trim();
            const pass = document.getElementById('xtreamPass').value.trim();
            if(!url || !user || !pass) { alert("Completa todos los campos"); return; }
            newServer = { id: newId, name, url: url.replace(/\/+$/,''), user, pass, type: "xtream", active: false };
        } else {
            const m3u = document.getElementById('m3uUrl').value.trim();
            if(!m3u) { alert("Ingresa la URL M3U"); return; }
            newServer = { id: newId, name, m3uUrl: m3u, type: "m3u", active: false };
        }
        servers.push(newServer);
        const ex = new Date(); ex.setFullYear(ex.getFullYear()+1);
        serverExpiryDates[newId] = ex.toISOString();
        saveData();
        setActiveServer(newId);
        modal.remove();
    };
}

function showServerManager() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    let serversHtml = '';
    for(const s of servers) {
        serversHtml += `
            <div class="server-row">
                <div><strong>${escapeHtml(s.name)}</strong><br><small>Expira: ${serverExpiryDates[s.id] ? new Date(serverExpiryDates[s.id]).toLocaleDateString() : '∞'}</small></div>
                <div style="display:flex;gap:6px;">
                    ${s.id === currentServer.id ? '<span style="color:#ff6b1a;">✅ Activo</span>' : `<button onclick="window.activateSrv(${s.id})">Activar</button>`}
                    <button class="btn-danger" onclick="window.delSrv(${s.id})">🗑</button>
                </div>
            </div>
        `;
    }
    modal.innerHTML = `
        <div class="modal-card">
            <h3>📡 MIS SERVIDORES</h3>
            ${serversHtml}
            <button id="addNewServerBtn">➕ Agregar nuevo</button>
            <button class="btn-secondary" onclick="this.closest('.modal').remove()">Cerrar</button>
        </div>
    `;
    document.body.appendChild(modal);
    window.activateSrv = (id) => { setActiveServer(id); modal.remove(); };
    window.delSrv = (id) => { deleteServer(id); modal.remove(); setTimeout(showServerManager, 100); };
    document.getElementById('addNewServerBtn').onclick = () => { modal.remove(); showAddServerModal(); };
}

// ===================== UTILITIES =====================
function filterChannels() {
    const term = searchTerm.toLowerCase();
    document.querySelectorAll('.ch-item').forEach(item => {
        const txt = item.querySelector('span:not(.ch-icon)')?.textContent || '';
        item.style.display = txt.toLowerCase().includes(term) ? 'flex' : 'none';
    });
}
document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value; filterChannels(); });

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;');
}

// Inicializar eventos de pestañas
function initTabs() {
    const tabs = document.querySelectorAll('.nav-tab');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTab = tab.getAttribute('data-tab');
            allChannels = [];
            loadCategories();
        });
    });
}
initTabs();

// Botones de agregar
document.getElementById('heroPlusBtn').onclick = showAddServerModal;
document.getElementById('sectionAddBtn').onclick = showAddServerModal;
document.getElementById('globalFab').onclick = showAddServerModal;
document.getElementById('navAddBtn').onclick = showAddServerModal;
document.getElementById('serverBtn').onclick = showServerManager;
document.getElementById('settingsBtn').onclick = () => alert("Ajustes: versión completa. Puedes gestionar servidores desde el botón 📁");

// Iniciar
loadData();
</script>
