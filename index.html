<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>🦂 LUIS R 🦉</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:system-ui;padding:15px}
        .lock-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:10000;display:flex;justify-content:center;align-items:center}
        .lock-card{background:#121218;border-radius:60px;padding:40px 30px;text-align:center;border:2px solid #ffd700;width:320px}
        .lock-card h2{color:#ffd700;margin-bottom:15px}
        .lock-card input{width:100%;padding:14px;background:#1e1e2a;border:2px solid #ffd700;border-radius:40px;color:white;text-align:center;font-size:1.2rem;letter-spacing:4px;margin-bottom:20px}
        .lock-card button{background:#ffd700;border:none;padding:12px 30px;border-radius:40px;font-weight:bold;cursor:pointer}
        .error-msg{color:#ff6666;margin-top:10px}
        .main-content{display:none}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;background:#111;padding:12px 20px;border-radius:60px;margin-bottom:20px;border:2px solid #ffd700}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-text{font-size:1.8rem;font-weight:bold;background:linear-gradient(135deg,#ffd700,#ffaa00);-webkit-background-clip:text;background-clip:text;color:transparent}
        .logo-emojis{font-size:1.8rem}
        .btn{background:#ffd700;border:none;padding:8px 20px;border-radius:40px;font-weight:bold;cursor:pointer}
        .tabs{display:flex;gap:15px;overflow-x:auto;margin-bottom:20px}
        .tab{background:#1e1e2a;padding:10px 24px;border-radius:40px;cursor:pointer;white-space:nowrap}
        .tab.active{background:#ffd700;color:#000}
        .main{display:flex;flex-direction:column;gap:20px;height:calc(100vh - 160px);overflow:hidden}
        @media (min-width:800px){.main{flex-direction:row}}
        .sidebar{background:#111;border-radius:30px;padding:18px;overflow-y:auto;flex:1}
        .player-area{background:#000;border-radius:30px;overflow:hidden;flex:2;display:flex;flex-direction:column}
        video{width:100%;max-height:450px;background:#000}
        .channel-item{background:#1e1e2a;padding:14px;margin:10px 0;border-radius:40px;cursor:pointer}
        .channel-item:hover{background:#ffd700;color:#000}
        .player-controls{display:flex;gap:12px;padding:12px;background:#1a1a1a;flex-wrap:wrap;justify-content:center}
        .control-btn{background:#1e1e2a;border:none;padding:8px 18px;border-radius:40px;color:white;cursor:pointer}
        .control-btn:hover{background:#ffd700;color:#000}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#000;padding:8px 20px;border-radius:40px;z-index:3000;animation:fadeOut 2s forwards}
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
        .loading{padding:20px;text-align:center}
        @media (max-width:800px){.logo-text{font-size:1.3rem}.logo-emojis{font-size:1.3rem}.btn{font-size:11px;padding:6px 12px}}
    </style>
</head>
<body>

<!-- Pantalla de bloqueo con PIN -->
<div id="lockScreen" class="lock-screen">
    <div class="lock-card">
        <h2>🔐 ACCESO</h2>
        <p>Ingresa el PIN</p>
        <input type="password" id="pinInput" maxlength="4" placeholder="****">
        <button onclick="verificarPin()">INGRESAR</button>
        <div id="pinError" class="error-msg"></div>
    </div>
</div>

<!-- Contenido principal (oculto hasta validar PIN) -->
<div id="mainContent" class="main-content">
    <div class="header">
        <div class="logo">
            <span class="logo-emojis">🦂</span>
            <span class="logo-text">LUIS R</span>
            <span class="logo-emojis">🦉</span>
        </div>
        <div>
            <button class="btn" id="addServerBtn">➕ SERVIDOR</button>
            <button class="btn" id="serversBtn">📡 LISTAS</button>
            <span id="clock"></span>
        </div>
    </div>

    <div class="tabs" id="tabContainer">
        <div class="tab active" data-tab="live">📺 LIVE</div>
        <div class="tab" data-tab="movies">🎬 PELIS</div>
        <div class="tab" data-tab="series">📺 SERIES</div>
        <div class="tab" data-tab="fav">⭐ FAV</div>
        <div class="tab" data-tab="m3u">📁 M3U</div>
    </div>

    <div class="main">
        <div class="sidebar">
            <input type="text" id="searchInput" placeholder="🔍 Buscar..." style="width:100%;padding:12px;border-radius:40px;border:none;background:#1e1e2a;color:white;margin-bottom:15px">
            <div id="contentList">📡 Cargando...</div>
        </div>
        <div class="player-area">
            <video id="video" controls autoplay playsinline></video>
            <div class="player-controls">
                <button class="control-btn" id="backBtn">⏪ 10s</button>
                <button class="control-btn" id="forwardBtn">⏩ 10s</button>
                <button class="control-btn" id="speedBtn">⚡ 1.0x</button>
                <button class="control-btn" id="pipBtn">📺 PiP</button>
            </div>
            <div id="nowPlaying" style="padding:12px;text-align:center;background:#111">✅ Selecciona un canal</div>
        </div>
    </div>
</div>

<script>
    // ==================== PIN DE ACCESO ====================
    function verificarPin() {
        const pin = document.getElementById('pinInput').value;
        if (pin === "1515") {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            iniciarApp();
        } else {
            document.getElementById('pinError').innerHTML = '❌ PIN incorrecto';
            document.getElementById('pinInput').value = '';
        }
    }

    // ==================== VARIABLES GLOBALES ====================
    let servers = [];
    let activeServer = null;
    let currentTab = 'live';
    let hlsPlayer = null;
    let favoritos = JSON.parse(localStorage.getItem('luis_favs') || '[]');
    
    // Servidores por defecto (los que usted proporcionó)
    const DEFAULT_SERVERS = [
        { id: 1, name: "Latin 1 (Laura)", url: "http://latinchannel.tv:8080", user: "laura.cal", pass: "cal130325", type: "xtream", active: true },
        { id: 2, name: "Latin 2 (Rafael)", url: "http://latinchannel.tv:8080", user: "rafael.mazzilli", pass: "mazzilli1402", type: "xtream", active: false },
        { id: 3, name: "TecnoMolly (Grupo)", url: "http://app.tecnomolly.com:8080", user: "Grupoelite", pass: "6rxPVLJGR9tH", type: "xtream", active: false }
    ];

    function loadServers() {
        let saved = localStorage.getItem('luis_servers');
        if (saved) {
            servers = JSON.parse(saved);
        } else {
            servers = JSON.parse(JSON.stringify(DEFAULT_SERVERS));
        }
        activeServer = servers.find(s => s.active) || servers[0];
        renderView();
    }

    function saveServers() {
        localStorage.setItem('luis_servers', JSON.stringify(servers));
    }

    function renderView() {
        loadCategories();
    }

    // ==================== CARGAR CATEGORÍAS ====================
    async function loadCategories() {
        const container = document.getElementById('contentList');
        if (currentTab === 'fav') {
            mostrarFavoritos();
            return;
        }
        if (currentTab === 'm3u') {
            mostrarM3U();
            return;
        }
        if (!activeServer) {
            container.innerHTML = '<div class="loading">❌ No hay servidor activo</div>';
            return;
        }
        container.innerHTML = `<div class="loading">📡 ${activeServer.name}</div><div id="catsContainer"></div>`;
        const catsContainer = document.getElementById('catsContainer');
        if (!catsContainer) return;
        
        let endpoint = '';
        if (currentTab === 'live') endpoint = `${activeServer.url}/player_api.php?username=${activeServer.user}&password=${activeServer.pass}&action=get_live_categories`;
        else if (currentTab === 'movies') endpoint = `${activeServer.url}/player_api.php?username=${activeServer.user}&password=${activeServer.pass}&action=get_vod_categories`;
        else if (currentTab === 'series') endpoint = `${activeServer.url}/player_api.php?username=${activeServer.user}&password=${activeServer.pass}&action=get_series_categories`;
        if (!endpoint) return;
        
        try {
            const res = await fetch(endpoint);
            const data = await res.json();
            if (!Array.isArray(data)) throw new Error();
            let html = '';
            for (let cat of data) {
                html += `<div style="margin-bottom:12px;">
                            <div style="background:#1e1e2a; padding:12px; border-radius:30px; cursor:pointer;" onclick="loadStreams(this, ${cat.category_id})">📁 ${cat.category_name} ▼</div>
                            <div class="cat-content" style="display:none; margin-left:20px;"></div>
                         </div>`;
            }
            catsContainer.innerHTML = html;
        } catch(e) {
            catsContainer.innerHTML = '<div class="loading">❌ Error de conexión</div>';
        }
    }

    window.loadStreams = async function(header, catId) {
        let contentDiv = header.nextElementSibling;
        if (contentDiv.style.display === 'block') {
            contentDiv.style.display = 'none';
            return;
        }
        contentDiv.innerHTML = '<div class="loading">Cargando...</div>';
        contentDiv.style.display = 'block';
        
        let endpoint = '';
        if (currentTab === 'live') endpoint = `${activeServer.url}/player_api.php?username=${activeServer.user}&password=${activeServer.pass}&action=get_live_streams&category_id=${catId}`;
        else if (currentTab === 'movies') endpoint = `${activeServer.url}/player_api.php?username=${activeServer.user}&password=${activeServer.pass}&action=get_vod_streams&category_id=${catId}`;
        else if (currentTab === 'series') {
            // Para series se podrían cargar las temporadas, pero por simplicidad mostramos mensaje
            contentDiv.innerHTML = '<div class="loading">Función de series en desarrollo</div>';
            return;
        }
        try {
            const res = await fetch(endpoint);
            const data = await res.json();
            if (!Array.isArray(data)) {
                contentDiv.innerHTML = '<div class="loading">Sin canales</div>';
                return;
            }
            let html = '';
            for (let item of data) {
                let name = item.name || item.title;
                let streamUrl = '';
                if (currentTab === 'live') {
                    streamUrl = `${activeServer.url}/live/${activeServer.user}/${activeServer.pass}/${item.stream_id}.m3u8`;
                } else if (currentTab === 'movies') {
                    let ext = item.container_extension || 'mp4';
                    streamUrl = `${activeServer.url}/movie/${activeServer.user}/${activeServer.pass}/${item.stream_id}.${ext}`;
                }
                html += `<div class="channel-item" onclick='playStream("${streamUrl}", "${name.replace(/['"]/g, '\\"')}")'>📺 ${name}</div>`;
            }
            contentDiv.innerHTML = html;
        } catch(e) {
            contentDiv.innerHTML = '<div class="loading">Error al cargar</div>';
        }
    };

    window.playStream = function(url, title) {
        const video = document.getElementById('video');
        const now = document.getElementById('nowPlaying');
        if (hlsPlayer) hlsPlayer.destroy();
        video.pause();
        video.removeAttribute('src');
        video.load();
        now.innerHTML = `⏳ Cargando ${title}...`;
        
        // Guardar en historial (opcional)
        let historial = JSON.parse(localStorage.getItem('luis_history') || '[]');
        historial.unshift({ title, url, fecha: new Date().toLocaleTimeString() });
        if (historial.length > 20) historial.pop();
        localStorage.setItem('luis_history', JSON.stringify(historial));
        
        if (url.includes('.m3u8') && Hls.isSupported()) {
            let hls = new Hls({ enableWorker: true });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); now.innerHTML = `▶️ ${title}`; });
            hls.on(Hls.Events.ERROR, () => { now.innerHTML = `❌ Error en ${title}`; });
            hlsPlayer = hls;
        } else {
            video.src = url;
            video.play().catch(() => now.innerHTML = `🔊 ${title} (toca play)`);
            now.innerHTML = `▶️ ${title}`;
        }
    };

    function mostrarFavoritos() {
        const container = document.getElementById('contentList');
        if (!favoritos.length) {
            container.innerHTML = '<div class="loading">⭐ No hay favoritos</div>';
            return;
        }
        let html = '<div class="loading">⭐ MIS FAVORITOS</div>';
        for (let fav of favoritos) {
            html += `<div class="channel-item" onclick='playStream("${fav.url}", "${fav.name.replace(/['"]/g, '\\"')}")'>⭐ ${fav.name}</div>`;
        }
        container.innerHTML = html;
    }

    function mostrarM3U() {
        const container = document.getElementById('contentList');
        container.innerHTML = `<textarea id="m3uUrl" rows="3" placeholder="https://ejemplo.com/lista.m3u" style="width:100%;padding:12px;border-radius:30px;background:#1e1e2a;color:white;border:none;"></textarea>
                               <button class="btn" id="loadM3UBtn" style="margin-top:15px;">📡 CARGAR CANALES</button>
                               <div id="m3uChannels" style="margin-top:20px;"></div>`;
        document.getElementById('loadM3UBtn').onclick = async () => {
            let url = document.getElementById('m3uUrl').value.trim();
            if (!url) return alert("Pega una URL M3U");
            try {
                const res = await fetch(url);
                const text = await res.text();
                const lines = text.split('\n');
                let channels = [];
                for (let i=0; i<lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        let nameMatch = lines[i].match(/#EXTINF:.*?,(.*)$/);
                        let name = nameMatch ? nameMatch[1] : 'Canal';
                        let urlLine = '';
                        for (let j=i+1; j<lines.length; j++) {
                            if (lines[j].trim() && !lines[j].startsWith('#')) {
                                urlLine = lines[j].trim();
                                break;
                            }
                        }
                        if (urlLine) channels.push({ name, url: urlLine });
                    }
                }
                let html = '<div class="loading">📺 CANALES M3U</div>';
                for (let ch of channels) {
                    html += `<div class="channel-item" onclick='playStream("${ch.url}", "${ch.name.replace(/['"]/g, '\\"')}")'>📺 ${ch.name}</div>`;
                }
                document.getElementById('m3uChannels').innerHTML = html;
            } catch(e) {
                alert("Error al cargar M3U");
            }
        };
    }

    // ==================== AGREGAR SERVIDOR MANUALMENTE ====================
    function showAddServerModal() {
        let modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.background = 'rgba(0,0,0,0.96)';
        modal.style.backdropFilter = 'blur(12px)';
        modal.style.zIndex = '2000';
        modal.style.display = 'flex';
        modal.style.alignItems = 'center';
        modal.style.justifyContent = 'center';
        modal.style.padding = '20px';
        modal.innerHTML = `<div style="background:#121218; border-radius:40px; width:100%; max-width:500px; padding:28px; border:2px solid #ffd700;">
            <h3 style="color:#ffd700; margin-bottom:20px; text-align:center;">➕ AGREGAR SERVIDOR</h3>
            <input id="newName" placeholder="Nombre" style="width:100%; padding:12px; margin-bottom:12px; background:#1e1e2a; border:1px solid #333; border-radius:30px; color:white;">
            <input id="newUrl" placeholder="URL (http://...:8080)" style="width:100%; padding:12px; margin-bottom:12px; background:#1e1e2a; border:1px solid #333; border-radius:30px; color:white;">
            <input id="newUser" placeholder="Usuario" style="width:100%; padding:12px; margin-bottom:12px; background:#1e1e2a; border:1px solid #333; border-radius:30px; color:white;">
            <div style="position:relative; width:100%; margin-bottom:12px;">
                <input id="newPass" type="password" placeholder="Contraseña" style="width:100%; padding:12px; padding-right:45px; background:#1e1e2a; border:1px solid #333; border-radius:30px; color:white;">
                <button onclick="togglePass('newPass')" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); background:none; border:none; color:#aaa; cursor:pointer;">👁️</button>
            </div>
            <textarea id="newM3U" rows="2" placeholder="O pega una URL M3U completa" style="width:100%; padding:12px; margin-bottom:12px; background:#1e1e2a; border:1px solid #333; border-radius:30px; color:white;"></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="saveXtream" style="background:#ffd700; color:#000; padding:10px 20px; border-radius:40px; font-weight:bold; border:none; cursor:pointer;">💾 Guardar Xtream</button>
                <button id="saveM3U" style="background:#10b981; color:#fff; padding:10px 20px; border-radius:40px; font-weight:bold; border:none; cursor:pointer;">📁 Guardar M3U</button>
                <button onclick="this.closest('div').parentElement.remove()" style="background:#444; color:#fff; padding:10px 20px; border-radius:40px; border:none; cursor:pointer;">Cancelar</button>
            </div>
        </div>`;
        document.body.appendChild(modal);
        
        document.getElementById('saveXtream').onclick = () => {
            let name = document.getElementById('newName').value.trim();
            let url = document.getElementById('newUrl').value.trim();
            let user = document.getElementById('newUser').value.trim();
            let pass = document.getElementById('newPass').value.trim();
            if (!name || !url || !user || !pass) { alert("Completa todos los campos"); return; }
            let newId = Date.now();
            servers.push({ id: newId, name, url, user, pass, type: "xtream", active: false });
            saveServers();
            activeServer = servers[servers.length-1];
            renderView();
            modal.remove();
            mostrarToast(`✅ Servidor ${name} agregado`);
        };
        
        document.getElementById('saveM3U').onclick = () => {
            let name = document.getElementById('newName').value.trim();
            let m3u = document.getElementById('newM3U').value.trim();
            if (!name || !m3u) { alert("Nombre y URL M3U requeridos"); return; }
            let newId = Date.now();
            servers.push({ id: newId, name, m3uUrl: m3u, type: "m3u", active: false });
            saveServers();
            activeServer = servers[servers.length-1];
            renderView();
            modal.remove();
            mostrarToast(`✅ Lista M3U ${name} agregada`);
        };
    }

    function showServersList() {
        let modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.background = 'rgba(0,0,0,0.96)';
        modal.style.backdropFilter = 'blur(12px)';
        modal.style.zIndex = '2000';
        modal.style.display = 'flex';
        modal.style.alignItems = 'center';
        modal.style.justifyContent = 'center';
        modal.style.padding = '20px';
        modal.style.overflowY = 'auto';
        let html = `<div style="background:#121218; border-radius:40px; width:100%; max-width:600px; max-height:85vh; overflow-y:auto; padding:28px; border:2px solid #ffd700;">
            <h3 style="color:#ffd700; margin-bottom:20px; text-align:center;">📡 MIS SERVIDORES</h3>`;
        for (let s of servers) {
            let detail = s.type === 'xtream' ? `${s.url} | ${s.user}` : `M3U: ${s.m3uUrl?.substring(0,40)}...`;
            html += `<div style="background:#1a1a24; margin:10px 0; padding:12px; border-radius:30px; display:flex; justify-content:space-between; flex-wrap:wrap;">
                        <div><strong>${s.name}</strong> ${s.id === activeServer?.id ? '✅' : ''}<br><small>${detail}</small></div>
                        <div>${s.id !== activeServer?.id ? `<button onclick="setActive(${s.id})" style="background:#3b82f6; color:#fff; padding:6px 12px; border-radius:30px; border:none; cursor:pointer;">Activar</button>` : ''}
                        <button onclick="delServer(${s.id})" style="background:#dc2626; color:#fff; padding:6px 12px; border-radius:30px; border:none; cursor:pointer;">🗑</button></div>
                    </div>`;
        }
        html += `<button onclick="this.closest('div').parentElement.remove()" style="margin-top:20px; background:#444; color:#fff; padding:10px 20px; border-radius:40px; border:none; cursor:pointer;">Cerrar</button></div>`;
        modal.innerHTML = html;
        document.body.appendChild(modal);
        
        window.setActive = (id) => {
            activeServer = servers.find(s => s.id === id);
            // Marcar como activo en el array
            servers = servers.map(s => ({ ...s, active: s.id === id }));
            saveServers();
            renderView();
            modal.remove();
            mostrarToast(`📡 Cambiado a ${activeServer.name}`);
        };
        window.delServer = (id) => {
            if (servers.length <= 1) { alert("Debe haber al menos un servidor"); return; }
            servers = servers.filter(s => s.id !== id);
            if (activeServer.id === id) activeServer = servers[0];
            saveServers();
            renderView();
            modal.remove();
            showServersList();
        };
    }

    function mostrarToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function togglePass(id) {
        let x = document.getElementById(id);
        x.type = x.type === 'password' ? 'text' : 'password';
    }

    function updateClock() {
        document.getElementById('clock').innerHTML = new Date().toLocaleTimeString();
    }

    function iniciarApp() {
        loadServers();
        updateClock();
        setInterval(updateClock, 1000);
        // Cargar favoritos desde localStorage
        favoritos = JSON.parse(localStorage.getItem('luis_favs') || '[]');
    }

    // ==================== EVENTOS ====================
    document.getElementById('addServerBtn').onclick = showAddServerModal;
    document.getElementById('serversBtn').onclick = showServersList;
    document.getElementById('backBtn').onclick = () => {
        let v = document.getElementById('video');
        v.currentTime = Math.max(0, v.currentTime - 10);
    };
    document.getElementById('forwardBtn').onclick = () => {
        let v = document.getElementById('video');
        v.currentTime = Math.min(v.duration, v.currentTime + 10);
    };
    document.getElementById('speedBtn').onclick = () => {
        let v = document.getElementById('video');
        let speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
        let idx = speeds.indexOf(v.playbackRate);
        v.playbackRate = speeds[(idx + 1) % speeds.length];
        document.getElementById('speedBtn').innerHTML = `⚡ ${v.playbackRate}x`;
    };
    document.getElementById('pipBtn').onclick = () => {
        let v = document.getElementById('video');
        if (v.requestPictureInPicture) v.requestPictureInPicture();
        else alert("PiP no compatible");
    };
    document.getElementById('searchInput').addEventListener('input', (e) => {
        let term = e.target.value.toLowerCase();
        document.querySelectorAll('.channel-item').forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
        });
    });
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        renderView();
    }
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.getAttribute('data-tab')));
    });
</script>
</body>
</html>
